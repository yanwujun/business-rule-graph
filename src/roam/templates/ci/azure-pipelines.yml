# roam-code Analysis Pipeline for Azure DevOps
#
# Runs roam-code health checks and rules validation on pull requests.
# Publishes SARIF results and posts a PR comment with quality summary.
#
# Prerequisites:
#   - Python 3.10+ (uses UsePythonVersion task)
#   - pip install roam-code
#
# Variables (set in pipeline definition or variable group):
#   roamPythonVersion: Python version (default: 3.12)
#   roamHealthGate:    Minimum health score to pass (default: 60)
#
# To customize: copy this file to azure-pipelines.yml in your project root.
# Generated by: roam ci-setup --platform azure

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

variables:
  roamPythonVersion: '3.12'
  roamHealthGate: 60
  pip_cache_dir: $(Pipeline.Workspace)/.pip

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Analyze
    displayName: 'roam-code Analysis'
    jobs:
      - job: RoamAnalysis
        displayName: 'Health & Rules Check'
        steps:
          - checkout: self
            fetchDepth: 0  # Full history for git analysis

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(roamPythonVersion)'
            displayName: 'Set up Python $(roamPythonVersion)'

          - task: Cache@2
            inputs:
              key: 'pip | "$(Agent.OS)" | requirements.txt'
              restoreKeys: |
                pip | "$(Agent.OS)"
              path: $(pip_cache_dir)
            displayName: 'Cache pip packages'

          - script: |
              pip install --quiet roam-code
            displayName: 'Install roam-code'

          - script: |
              roam init
            displayName: 'Build index'

          - script: |
              roam --json health > $(Build.ArtifactStagingDirectory)/roam-health.json
              roam health
            displayName: 'Run health check'

          - script: |
              roam --json check-rules > $(Build.ArtifactStagingDirectory)/roam-rules.json || true
              roam check-rules || true
            displayName: 'Run rules check'

          - script: |
              roam --sarif health > $(Build.ArtifactStagingDirectory)/roam-health.sarif || true
              roam --sarif check-rules > $(Build.ArtifactStagingDirectory)/roam-rules.sarif 2>/dev/null || true
            displayName: 'Generate SARIF reports'

          - script: |
              HEALTH_SCORE=$(python3 -c "
              import json
              try:
                  data = json.load(open('$(Build.ArtifactStagingDirectory)/roam-health.json'))
                  print(data.get('summary', {}).get('health_score', 0))
              except Exception:
                  print(0)
              ")
              echo "Health score: ${HEALTH_SCORE}/100"
              echo "##vso[task.setvariable variable=healthScore]${HEALTH_SCORE}"

              if [ "${HEALTH_SCORE}" -lt "$(roamHealthGate)" ]; then
                echo "##vso[task.logissue type=error]Health score ${HEALTH_SCORE} is below gate threshold $(roamHealthGate)"
                exit 1
              fi
            displayName: 'Enforce quality gate'

          # Post PR comment via Azure DevOps REST API
          - script: |
              if [ "$(Build.Reason)" = "PullRequest" ]; then
                RULES_VERDICT=$(python3 -c "
              import json
              try:
                  data = json.load(open('$(Build.ArtifactStagingDirectory)/roam-rules.json'))
                  v = data.get('summary', {}).get('verdict', 'unknown')
                  violations = data.get('summary', {}).get('violations', 0)
                  print(f'{v} ({violations} violations)')
              except Exception:
                  print('not available')
              " 2>/dev/null || echo "not available")

                PR_ID=$(echo "$(System.PullRequest.PullRequestId)" | grep -o '[0-9]*' || echo "")

                if [ -n "${PR_ID}" ]; then
                  COMMENT_BODY="## roam-code Analysis\n\n| Metric | Value |\n|--------|-------|\n| Health Score | **$(healthScore)/100** |\n| Gate Threshold | $(roamHealthGate) |\n| Rules | ${RULES_VERDICT} |\n| Commit | \`$(Build.SourceVersion)\` |\n\n---\n*Generated by [roam-code](https://github.com/Cranot/roam-code)*"

                  python3 -c "
              import json, urllib.request, os

              org_url = os.environ.get('SYSTEM_TEAMFOUNDATIONCOLLECTIONURI', '')
              project = os.environ.get('SYSTEM_TEAMPROJECT', '')
              repo_id = os.environ.get('BUILD_REPOSITORY_ID', '')
              pr_id = '${PR_ID}'
              token = os.environ.get('SYSTEM_ACCESSTOKEN', '')

              if not all([org_url, project, repo_id, pr_id, token]):
                  print('Warning: Missing Azure DevOps variables for PR comment')
                  raise SystemExit(0)

              url = f'{org_url}{project}/_apis/git/repositories/{repo_id}/pullRequests/{pr_id}/threads?api-version=7.1'
              body = json.dumps({
                  'comments': [{'parentCommentId': 0, 'content': '${COMMENT_BODY}', 'commentType': 1}],
                  'status': 1
              }).encode()

              import base64
              auth = base64.b64encode(f':{token}'.encode()).decode()
              req = urllib.request.Request(url, data=body, method='POST')
              req.add_header('Content-Type', 'application/json')
              req.add_header('Authorization', f'Basic {auth}')

              try:
                  urllib.request.urlopen(req)
                  print('PR comment posted successfully')
              except Exception as e:
                  print(f'Warning: Could not post PR comment: {e}')
              " || echo "Warning: PR comment posting failed"
                fi
              fi
            displayName: 'Post PR comment'
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'roam-code-results'
            displayName: 'Publish artifacts'
            condition: always()
