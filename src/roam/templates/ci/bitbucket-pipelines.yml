# roam-code Analysis Pipeline for Bitbucket Pipelines
#
# Runs roam-code health checks and rules validation on pull requests.
# Creates a Bitbucket Code Insights report via the API.
#
# Prerequisites:
#   - Python 3.10+ (uses python:3.12-slim image by default)
#   - pip install roam-code
#
# Repository variables (set in Repository Settings > Pipelines > Variables):
#   ROAM_HEALTH_GATE: Minimum health score to pass (default: 60)
#
# Bitbucket Pipelines provides these variables automatically:
#   BITBUCKET_COMMIT, BITBUCKET_REPO_SLUG, BITBUCKET_WORKSPACE,
#   BITBUCKET_PR_ID, BITBUCKET_BUILD_NUMBER
#
# To customize: copy this file to bitbucket-pipelines.yml in your project root.
# Generated by: roam ci-setup --platform bitbucket

image: python:3.12-slim

definitions:
  caches:
    roam: .roam
    pipcustom: ~/.cache/pip

pipelines:
  pull-requests:
    '**':
      - step:
          name: roam-code Analysis
          caches:
            - pipcustom
            - roam
          script:
            # Install roam-code
            - pip install --quiet roam-code

            # Build/refresh the index
            - roam init

            # Run health check
            - roam --json health > roam-health.json
            - roam health

            # Run rules check (advisory: findings ship in artifacts + Code
            # Insights report; the merge gate is health-score-only below).
            - roam --json check-rules > roam-rules.json || true
            - roam check-rules || true

            # Generate SARIF reports (advisory: artifacts ship for CI
            # ingestion; generation failure does not block the pipeline).
            - roam --sarif health > roam-health.sarif || true
            - roam --sarif check-rules > roam-rules.sarif 2>/dev/null || true

            # Extract health score
            - >
              HEALTH_SCORE=$(python3 -c "
              import json
              try:
                  data = json.load(open('roam-health.json'))
                  print(data.get('summary', {}).get('health_score', 0))
              except Exception:
                  print(0)
              ")
            - echo "Health score: ${HEALTH_SCORE}/100"

            # Create Bitbucket Code Insights report
            - >
              python3 -c "
              import json, urllib.request, os, sys

              workspace = os.environ.get('BITBUCKET_WORKSPACE', '')
              repo_slug = os.environ.get('BITBUCKET_REPO_SLUG', '')
              commit = os.environ.get('BITBUCKET_COMMIT', '')
              gate = int(os.environ.get('ROAM_HEALTH_GATE', '60'))

              if not all([workspace, repo_slug, commit]):
                  print('Warning: Missing Bitbucket environment variables')
                  sys.exit(0)

              # Load results
              try:
                  health = json.load(open('roam-health.json'))
                  score = int(health.get('summary', {}).get('health_score', 0))
              except Exception:
                  score = 0

              try:
                  rules = json.load(open('roam-rules.json'))
                  violations = int(rules.get('summary', {}).get('violations', 0))
                  rules_verdict = rules.get('summary', {}).get('verdict', 'unknown')
              except Exception:
                  violations = 0
                  rules_verdict = 'not available'

              result = 'PASSED' if score >= gate else 'FAILED'

              # Create report via Bitbucket Code Insights API
              url = (
                  f'https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}'
                  f'/commit/{commit}/reports/roam-code'
              )

              report = {
                  'title': 'roam-code Analysis',
                  'details': f'Health: {score}/100 | Rules: {rules_verdict}',
                  'report_type': 'BUG',
                  'reporter': 'roam-code',
                  'result': result,
                  'data': [
                      {'title': 'Health Score', 'type': 'NUMBER', 'value': score},
                      {'title': 'Gate Threshold', 'type': 'NUMBER', 'value': gate},
                      {'title': 'Rule Violations', 'type': 'NUMBER', 'value': violations},
                  ],
                  'link': 'https://github.com/Cranot/roam-code',
              }

              body = json.dumps(report).encode()
              # Uses Bitbucket Pipelines built-in authentication (no token needed)
              req = urllib.request.Request(url, data=body, method='PUT')
              req.add_header('Content-Type', 'application/json')

              try:
                  urllib.request.urlopen(req)
                  print(f'Report created: {result} (score={score}, gate={gate})')
              except Exception as e:
                  print(f'Warning: Could not create report: {e}')
                  print('Bitbucket Code Insights requires Pipelines OAuth credentials.')
              " || echo "Warning: Report creation failed"

            # Enforce gate
            - >
              HEALTH_SCORE=$(python3 -c "
              import json
              try:
                  data = json.load(open('roam-health.json'))
                  print(data.get('summary', {}).get('health_score', 0))
              except Exception:
                  print(0)
              ")
            - >
              GATE=${ROAM_HEALTH_GATE:-60}
            - >
              if [ "${HEALTH_SCORE}" -lt "${GATE}" ]; then
                echo "FAILED: Health score ${HEALTH_SCORE} below gate ${GATE}"
                exit 1
              fi
          artifacts:
            - roam-health.json
            - roam-rules.json
            - roam-health.sarif
            - roam-rules.sarif

  branches:
    main:
      - step:
          name: roam-code Health (main)
          caches:
            - pipcustom
            - roam
          script:
            - pip install --quiet roam-code
            - roam init
            - roam --json health > roam-health.json
            - roam health
          artifacts:
            - roam-health.json
    master:
      - step:
          name: roam-code Health (master)
          caches:
            - pipcustom
            - roam
          script:
            - pip install --quiet roam-code
            - roam init
            - roam --json health > roam-health.json
            - roam health
          artifacts:
            - roam-health.json
