# roam-code Analysis Pipeline for Bitbucket Pipelines
#
# Runs roam-code health checks and rules validation on pull requests.
# Creates a Bitbucket Code Insights report through Pipelines' authenticated
# localhost proxy.
#
# Supply-chain pins:
#   - roam-code is exactly 13.10.0.
#   - The Docker Official Image tag and OCI index digest were verified against
#     Docker Hub. The digest, not the tag, is the runtime trust anchor.
#
# Repository variables (set in Repository Settings > Pipelines > Variables):
#   ROAM_HEALTH_GATE: Minimum health score to pass (default: 60)
#
# To customize: copy this file to bitbucket-pipelines.yml in your project root.
# Generated by: roam ci-setup --platform bitbucket

image: "python:3.12.13-slim-bookworm@sha256:d50fb7611f86d04a3b0471b46d7557818d88983fc3136726336b2a4c657aa30b"

clone:
  depth: full

definitions:
  caches:
    roam: .roam
    pipcustom: ~/.cache/pip

pipelines:
  pull-requests:
    '**':
      - step:
          name: roam-code Analysis
          caches:
            - pipcustom
            - roam
          script:
            - |
              set -eu
              mkdir -p roam-advisory

              capture_advisory() {
                label=$1
                stdout_path=$2
                stderr_path=$3
                shift 3

                set +e
                "$@" > "$stdout_path" 2> "$stderr_path"
                exit_code=$?
                set -e

                state=completed
                if [ "$exit_code" -ne 0 ]; then
                  state=failed
                fi
                {
                  printf 'command=%s\n' "$*"
                  printf 'exit_code=%s\n' "$exit_code"
                  printf 'state=%s\n' "$state"
                } > "roam-advisory/${label}.status"
                if [ "$exit_code" -ne 0 ]; then
                  echo "ADVISORY ${label}: command exited ${exit_code}; inspect captured stderr and status artifacts." >&2
                fi
              }

              python -m pip install --quiet "roam-code==13.10.0"

              # Required evidence and gate inputs fail closed.
              roam init
              roam --json health > roam-health.json
              roam health

              # Rules findings are advisory for this health-score-only gate.
              capture_advisory rules-json roam-rules.json roam-advisory/rules-json.stderr \
                roam --json check-rules
              capture_advisory rules-text roam-advisory/rules.txt roam-advisory/rules-text.stderr \
                roam check-rules
              cat roam-advisory/rules.txt

              # Health SARIF is required; rules SARIF is explicitly advisory.
              roam --sarif health > roam-health.sarif
              capture_advisory rules-sarif roam-rules.sarif roam-advisory/rules-sarif.stderr \
                roam --sarif check-rules

              HEALTH_SCORE=$(
                python3 - <<'PY'
              import json
              import os
              import re
              from pathlib import Path

              gate = os.environ.get("ROAM_HEALTH_GATE", "60")
              if not re.fullmatch(r"(?:0|[1-9][0-9]?|100)", gate):
                  raise SystemExit("ROAM_HEALTH_GATE must be an integer from 0 through 100")
              payload = json.loads(Path("roam-health.json").read_text(encoding="utf-8"))
              score = payload.get("summary", {}).get("health_score")
              if isinstance(score, bool) or not isinstance(score, int) or not 0 <= score <= 100:
                  raise SystemExit(f"invalid or missing health_score: {score!r}")
              print(score)
              PY
              )
              echo "Health score: ${HEALTH_SCORE}/100"

              # Code Insights publication is advisory. Bitbucket documents the
              # localhost proxy as the credential-injection boundary for this API.
              set +e
              python3 - <<'PY' > roam-advisory/code-insights.stdout 2> roam-advisory/code-insights.stderr
              import json
              import os
              import re
              import urllib.error
              import urllib.parse
              import urllib.request
              from pathlib import Path

              def require(name: str, pattern: str) -> str:
                  value = os.environ.get(name, "")
                  if not re.fullmatch(pattern, value):
                      raise SystemExit(f"{name} has an invalid or missing value")
                  return value

              workspace = require("BITBUCKET_WORKSPACE", r"[A-Za-z0-9._-]{1,128}")
              repo_slug = require("BITBUCKET_REPO_SLUG", r"[A-Za-z0-9._-]{1,128}")
              commit = require("BITBUCKET_COMMIT", r"[0-9a-f]{40}")
              gate_raw = os.environ.get("ROAM_HEALTH_GATE", "60")
              if not re.fullmatch(r"(?:0|[1-9][0-9]?|100)", gate_raw):
                  raise SystemExit("ROAM_HEALTH_GATE must be an integer from 0 through 100")
              gate = int(gate_raw)

              health = json.loads(Path("roam-health.json").read_text(encoding="utf-8"))
              score = health.get("summary", {}).get("health_score")
              if isinstance(score, bool) or not isinstance(score, int) or not 0 <= score <= 100:
                  raise SystemExit(f"invalid or missing health_score: {score!r}")

              status_fields = dict(
                  line.split("=", 1)
                  for line in Path("roam-advisory/rules-json.status").read_text(encoding="utf-8").splitlines()
                  if "=" in line
              )
              rules_exit = status_fields.get("exit_code", "missing")
              try:
                  rules = json.loads(Path("roam-rules.json").read_text(encoding="utf-8"))
                  violations = rules.get("summary", {}).get("violations", rules.get("summary", {}).get("failed"))
                  rules_verdict = rules.get("summary", {}).get("verdict")
                  if not isinstance(rules_verdict, str) or not rules_verdict.strip():
                      raise ValueError("missing verdict")
              except (OSError, ValueError, TypeError, json.JSONDecodeError):
                  violations = None
                  rules_verdict = "unavailable"

              result = "PASSED" if score >= gate else "FAILED"
              report_data = [
                  {"title": "Health Score", "type": "NUMBER", "value": score},
                  {"title": "Gate Threshold", "type": "NUMBER", "value": gate},
              ]
              if isinstance(violations, int) and not isinstance(violations, bool) and violations >= 0:
                  report_data.append(
                      {"title": "Rule Violations", "type": "NUMBER", "value": violations}
                  )
              quoted_workspace = urllib.parse.quote(workspace, safe="")
              quoted_repo = urllib.parse.quote(repo_slug, safe="")
              url = (
                  f"http://api.bitbucket.org/2.0/repositories/{quoted_workspace}/{quoted_repo}"
                  f"/commit/{commit}/reports/roam-code"
              )
              report = {
                  "title": "roam-code Analysis",
                  "details": f"Health: {score}/100 | Rules: {rules_verdict} | advisory exit: {rules_exit}",
                  "report_type": "BUG",
                  "reporter": "roam-code",
                  "result": result,
                  "data": report_data,
                  "link": "https://github.com/Cranot/roam-code",
              }
              request = urllib.request.Request(
                  url,
                  data=json.dumps(report).encode("utf-8"),
                  method="PUT",
                  headers={"Content-Type": "application/json"},
              )
              proxy = urllib.request.ProxyHandler({"http": "http://localhost:29418"})
              opener = urllib.request.build_opener(proxy)
              try:
                  with opener.open(request, timeout=20) as response:
                      if not 200 <= response.status < 300:
                          raise SystemExit(f"Code Insights API returned HTTP {response.status}")
              except urllib.error.HTTPError as exc:
                  raise SystemExit(f"Code Insights API returned HTTP {exc.code}") from exc
              except urllib.error.URLError as exc:
                  raise SystemExit(f"Code Insights API request failed: {exc.reason}") from exc
              print(f"Code Insights report created: {result}")
              PY
              report_exit=$?
              set -e
              report_state=completed
              if [ "$report_exit" -ne 0 ]; then
                report_state=failed
                echo "ADVISORY code-insights: command exited ${report_exit}; inspect captured stderr." >&2
              fi
              {
                printf 'command=publish Bitbucket Code Insights report\n'
                printf 'exit_code=%s\n' "$report_exit"
                printf 'state=%s\n' "$report_state"
              } > roam-advisory/code-insights.status

              GATE=${ROAM_HEALTH_GATE:-60}
              if [ "$HEALTH_SCORE" -lt "$GATE" ]; then
                echo "FAILED: Health score ${HEALTH_SCORE} below gate ${GATE}" >&2
                exit 1
              fi
          artifacts:
            - roam-health.json
            - roam-rules.json
            - roam-health.sarif
            - roam-rules.sarif
            - roam-advisory/**

  branches:
    main:
      - step:
          name: roam-code Health (main)
          caches:
            - pipcustom
            - roam
          script:
            - python -m pip install --quiet "roam-code==13.10.0"
            - roam init
            - roam --json health > roam-health.json
            - roam health
          artifacts:
            - roam-health.json
    master:
      - step:
          name: roam-code Health (master)
          caches:
            - pipcustom
            - roam
          script:
            - python -m pip install --quiet "roam-code==13.10.0"
            - roam init
            - roam --json health > roam-health.json
            - roam health
          artifacts:
            - roam-health.json
