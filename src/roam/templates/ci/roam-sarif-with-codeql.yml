# Example: roam SARIF upload to GitHub Code Scanning on PRs
#
# roam-code uploads SARIF findings to GitHub Code Scanning via
# github/codeql-action/upload-sarif. This complements any CodeQL workflow you
# already run: CodeQL focuses on language-level vulnerability patterns, while
# roam focuses on codebase-shape findings (cycles, dark-matter coupling,
# god-components, dead code, AI rot, missing tests, n+1, over-fetch, ...).
#
# The `category:` field on `upload-sarif` labels the roam stream in the Code
# Scanning UI as "roam-health" without overlapping other SARIF producers.
#
# Copy this file to `.github/workflows/security.yml` in your repo.

name: Security analysis (roam SARIF)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # roam — local codebase intelligence with SARIF 2.1.0 output
  # ---------------------------------------------------------------------------
  roam:
    name: roam SARIF
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write   # required for SARIF upload to Code Scanning
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # full history required for pr-risk + git analysis
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install roam-code
        run: python -m pip install "roam-code==13.10.0"

      - name: Index repository
        run: roam init

      - name: Emit roam health SARIF
        run: roam --sarif health > roam-health.sarif

      - name: Upload roam SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          sarif_file: roam-health.sarif
          category: roam-health
