# Example: roam SARIF + CodeQL co-deploy on PRs
#
# Both roam-code and CodeQL upload SARIF findings to GitHub Code Scanning.
# Code Scanning de-duplicates by ruleId, so dual coverage is additive,
# not redundant: CodeQL focuses on language-level vulnerability patterns,
# roam focuses on codebase-shape findings (cycles, dark-matter coupling,
# god-components, dead code, AI rot, missing tests, n+1, over-fetch, ...).
#
# The two jobs run in parallel (default GitHub Actions behavior). The
# `category:` field on `upload-sarif` distinguishes the two streams in the
# Code Scanning UI so reviewers see "codeql" and "roam-health" findings
# side-by-side without overlap.
#
# Copy this file to `.github/workflows/security.yml` in your repo.

name: Security analysis (roam + CodeQL)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write   # required for SARIF upload to Code Scanning

jobs:
  # ---------------------------------------------------------------------------
  # CodeQL — official GitHub language-level security scanner
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: python   # adjust to match your repo (python, javascript, go, java, ...)

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: codeql

  # ---------------------------------------------------------------------------
  # roam — local codebase intelligence with SARIF 2.1.0 output
  # ---------------------------------------------------------------------------
  roam:
    name: roam SARIF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for pr-risk + git analysis

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install roam-code
        run: pip install roam-code

      - name: Index repository
        run: roam init

      - name: Emit roam health SARIF
        run: roam --sarif health > roam-health.sarif

      - name: Upload roam SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: roam-health.sarif
          category: roam-health
