# roam-code Analysis Pipeline for GitLab CI/CD
#
# Runs roam-code health checks and rules validation on merge requests.
# Generates SARIF artifacts and posts a quality summary as an MR comment.
#
# Supply-chain pins:
#   - roam-code is exactly 13.10.0.
#   - The Docker Official Image tag and OCI index digest were verified against
#     Docker Hub. The digest, not the tag, is the runtime trust anchor.
#
# Variables (set in CI/CD Settings > Variables or override in pipeline):
#   ROAM_HEALTH_GATE:    Minimum health score to pass (default: 60)
#   ROAM_EXTRA_COMMANDS: Space-separated advisory roam command names
#
# To customize: copy this file to .gitlab-ci.yml in your project root.
# Generated by: roam ci-setup --platform gitlab

variables:
  ROAM_HEALTH_GATE: "60"
  ROAM_EXTRA_COMMANDS: ""
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

stages:
  - analyze

cache:
  key: roam-${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/
    - .roam/

roam-analysis:
  stage: analyze
  image: "python:3.12.13-slim-bookworm@sha256:d50fb7611f86d04a3b0471b46d7557818d88983fc3136726336b2a4c657aa30b"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - python -m pip install --quiet "roam-code==13.10.0"
  script:
    - |
      set -eu
      mkdir -p roam-advisory

      # Advisory commands are allowed to return non-zero only through this
      # bounded protocol. Every invocation records stdout, stderr, exit code,
      # and an explicit state; required health evidence never uses it.
      capture_advisory() {
        label=$1
        stdout_path=$2
        stderr_path=$3
        shift 3

        set +e
        "$@" > "$stdout_path" 2> "$stderr_path"
        exit_code=$?
        set -e

        state=completed
        if [ "$exit_code" -ne 0 ]; then
          state=failed
        fi
        {
          printf 'command=%s\n' "$*"
          printf 'exit_code=%s\n' "$exit_code"
          printf 'state=%s\n' "$state"
        } > "roam-advisory/${label}.status"

        if [ "$exit_code" -ne 0 ]; then
          echo "ADVISORY ${label}: command exited ${exit_code}; inspect captured stderr and status artifacts." >&2
        fi
      }

      # Required evidence: any command or serialization failure stops the job.
      roam init
      roam --json health > roam-health.json
      roam health

      # Rules findings are advisory for this health-score-only template.
      capture_advisory rules-json roam-rules.json roam-advisory/rules-json.stderr \
        roam --json check-rules
      capture_advisory rules-text roam-advisory/rules.txt roam-advisory/rules-text.stderr \
        roam check-rules
      cat roam-advisory/rules.txt

      # Extra commands are explicitly advisory. Validate names before using
      # them as command arguments or artifact filenames.
      if [ -n "$ROAM_EXTRA_COMMANDS" ]; then
        if ! printf '%s' "$ROAM_EXTRA_COMMANDS" \
          | grep -Eq '^([a-z][a-z0-9-]{0,63})( [a-z][a-z0-9-]{0,63})*$'; then
          echo "ROAM_EXTRA_COMMANDS must contain only space-separated roam command names." >&2
          exit 1
        fi
        for command_name in $ROAM_EXTRA_COMMANDS; do
          echo "--- advisory roam ${command_name} ---"
          capture_advisory "extra-${command_name}-json" \
            "roam-extra-${command_name}.json" \
            "roam-advisory/extra-${command_name}-json.stderr" \
            roam --json "$command_name"
          capture_advisory "extra-${command_name}-text" \
            "roam-advisory/extra-${command_name}.txt" \
            "roam-advisory/extra-${command_name}-text.stderr" \
            roam "$command_name"
          cat "roam-advisory/extra-${command_name}.txt"
        done
      fi

      # Health SARIF is required because GitLab ingests it below. Rules SARIF
      # remains advisory and carries its own status artifact.
      roam --sarif health > roam-health.sarif
      capture_advisory rules-sarif roam-rules.sarif roam-advisory/rules-sarif.stderr \
        roam --sarif check-rules

      HEALTH_SCORE=$(
        python3 - <<'PY'
      import json
      import os
      import re
      from pathlib import Path

      gate = os.environ.get("ROAM_HEALTH_GATE", "")
      if not re.fullmatch(r"(?:0|[1-9][0-9]?|100)", gate):
          raise SystemExit("ROAM_HEALTH_GATE must be an integer from 0 through 100")

      payload = json.loads(Path("roam-health.json").read_text(encoding="utf-8"))
      score = payload.get("summary", {}).get("health_score")
      if isinstance(score, bool) or not isinstance(score, int) or not 0 <= score <= 100:
          raise SystemExit(f"invalid or missing health_score: {score!r}")
      print(score)
      PY
      )
      echo "Health score: ${HEALTH_SCORE}/100"
      if [ "$HEALTH_SCORE" -lt "$ROAM_HEALTH_GATE" ]; then
        echo "FAILED: Health score ${HEALTH_SCORE} is below gate threshold ${ROAM_HEALTH_GATE}" >&2
        exit 1
      fi

    # Posting the MR comment is explicitly advisory. Missing credentials,
    # malformed evidence, and HTTP failures become a disclosed status artifact.
    - |
      set -eu
      mkdir -p roam-advisory
      if [ -z "${CI_MERGE_REQUEST_IID:-}" ]; then
        {
          printf 'command=post GitLab merge-request comment\n'
          printf 'exit_code=0\n'
          printf 'state=not_applicable\n'
        } > roam-advisory/mr-comment.status
      else
        set +e
        python3 - <<'PY' > roam-advisory/mr-comment.stdout 2> roam-advisory/mr-comment.stderr
      import json
      import os
      import re
      import urllib.error
      import urllib.parse
      import urllib.request
      from datetime import datetime, timezone
      from pathlib import Path

      def require_digits(name: str) -> str:
          value = os.environ.get(name, "")
          if not re.fullmatch(r"[1-9][0-9]*", value):
              raise SystemExit(f"{name} must be a positive integer")
          return value

      def advisory_exit(label: str) -> str:
          path = Path("roam-advisory") / f"{label}.status"
          fields = dict(
              line.split("=", 1)
              for line in path.read_text(encoding="utf-8").splitlines()
              if "=" in line
          )
          return fields.get("exit_code", "missing")

      health = json.loads(Path("roam-health.json").read_text(encoding="utf-8"))
      score = health.get("summary", {}).get("health_score")
      if isinstance(score, bool) or not isinstance(score, int) or not 0 <= score <= 100:
          raise SystemExit(f"invalid or missing health_score: {score!r}")

      rules_exit = advisory_exit("rules-json")
      try:
          rules = json.loads(Path("roam-rules.json").read_text(encoding="utf-8"))
          verdict = rules.get("summary", {}).get("verdict")
          violations = rules.get("summary", {}).get("violations", rules.get("summary", {}).get("failed"))
          if not isinstance(verdict, str) or not verdict.strip():
              raise ValueError("missing verdict")
          rules_summary = f"{verdict} ({violations!r} violations; advisory exit {rules_exit})"
      except (OSError, ValueError, TypeError, json.JSONDecodeError):
          rules_summary = f"unavailable (advisory exit {rules_exit})"

      project_id = require_digits("CI_PROJECT_ID")
      merge_request_iid = require_digits("CI_MERGE_REQUEST_IID")
      gate = os.environ.get("ROAM_HEALTH_GATE", "")
      if not re.fullmatch(r"(?:0|[1-9][0-9]?|100)", gate):
          raise SystemExit("ROAM_HEALTH_GATE must be an integer from 0 through 100")
      token = os.environ.get("GITLAB_TOKEN") or os.environ.get("CI_JOB_TOKEN")
      if not token:
          raise SystemExit("GITLAB_TOKEN and CI_JOB_TOKEN are both unavailable")

      api_base = os.environ.get("CI_API_V4_URL", "").rstrip("/")
      parsed = urllib.parse.urlsplit(api_base)
      if parsed.scheme not in {"http", "https"} or not parsed.netloc or parsed.username or parsed.password:
          raise SystemExit("CI_API_V4_URL is not a canonical HTTP(S) API URL")
      url = f"{api_base}/projects/{project_id}/merge_requests/{merge_request_iid}/notes"

      body_text = "\n".join(
          [
              "## roam-code Analysis",
              "",
              "| Metric | Value |",
              "|--------|-------|",
              f"| Health Score | **{score}/100** |",
              f"| Gate Threshold | {gate} |",
              f"| Rules | {rules_summary} |",
              f"| Commit | `{os.environ.get('CI_COMMIT_SHORT_SHA', 'unknown')}` |",
              "",
              "SARIF and advisory status artifacts are attached to the job.",
              "",
              f"Generated by roam-code at {datetime.now(timezone.utc).isoformat()}.",
          ]
      )
      request = urllib.request.Request(
          url,
          data=json.dumps({"body": body_text}).encode("utf-8"),
          method="POST",
          headers={"Content-Type": "application/json", "PRIVATE-TOKEN": token},
      )

      class NoRedirect(urllib.request.HTTPRedirectHandler):
          def redirect_request(self, req, fp, code, msg, headers, newurl):
              return None

      opener = urllib.request.build_opener(NoRedirect)
      try:
          with opener.open(request, timeout=20) as response:
              if not 200 <= response.status < 300:
                  raise SystemExit(f"GitLab comment API returned HTTP {response.status}")
      except urllib.error.HTTPError as exc:
          raise SystemExit(f"GitLab comment API returned HTTP {exc.code}") from exc
      except urllib.error.URLError as exc:
          raise SystemExit(f"GitLab comment API request failed: {exc.reason}") from exc
      print("GitLab merge-request comment posted")
      PY
        comment_exit=$?
        set -e
        comment_state=completed
        if [ "$comment_exit" -ne 0 ]; then
          comment_state=failed
          echo "ADVISORY mr-comment: command exited ${comment_exit}; inspect captured stderr." >&2
        fi
        {
          printf 'command=post GitLab merge-request comment\n'
          printf 'exit_code=%s\n' "$comment_exit"
          printf 'state=%s\n' "$comment_state"
        } > roam-advisory/mr-comment.status
      fi
  artifacts:
    when: always
    paths:
      - roam-health.json
      - roam-rules.json
      - roam-health.sarif
      - roam-rules.sarif
      - roam-extra-*.json
      - roam-advisory/
    reports:
      # Health SARIF is generated by a required command above.
      sast: roam-health.sarif
