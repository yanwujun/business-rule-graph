# roam-code Analysis Pipeline for GitLab CI/CD
#
# Runs roam-code health checks and rules validation on merge requests.
# Generates SARIF artifacts and posts a quality summary as an MR comment.
#
# Prerequisites:
#   - Python 3.9+ available (uses python:3.12-slim image by default)
#   - pip install roam-code
#
# Variables (set in CI/CD Settings > Variables or override in pipeline):
#   ROAM_PYTHON_VERSION: Python image tag (default: 3.12-slim)
#   ROAM_HEALTH_GATE:    Minimum health score to pass (default: 60)
#   ROAM_EXTRA_COMMANDS:  Additional roam commands to run (default: empty)
#
# To customize: copy this file to .gitlab-ci.yml in your project root.
# Generated by: roam ci-setup --platform gitlab

variables:
  ROAM_PYTHON_VERSION: "3.12-slim"
  ROAM_HEALTH_GATE: "60"
  ROAM_EXTRA_COMMANDS: ""
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

stages:
  - analyze

cache:
  key: roam-${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/
    - .roam/

roam-analysis:
  stage: analyze
  image: python:${ROAM_PYTHON_VERSION}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - pip install --quiet roam-code
  script:
    # Build/refresh the index
    - roam init

    # Run health check (JSON for parsing + text for logs)
    - roam --json health > roam-health.json
    - roam health

    # Run rules check
    - roam --json check-rules > roam-rules.json || true
    - roam check-rules || true

    # Run any extra commands
    - |
      if [ -n "${ROAM_EXTRA_COMMANDS}" ]; then
        for CMD in ${ROAM_EXTRA_COMMANDS}; do
          echo "--- roam ${CMD} ---"
          roam --json "${CMD}" > "roam-${CMD}.json" || true
          roam "${CMD}" || true
        done
      fi

    # Generate SARIF reports
    - roam --sarif health > roam-health.sarif || true
    - roam --sarif check-rules > roam-rules.sarif 2>/dev/null || true

    # Extract health score and enforce gate
    - |
      HEALTH_SCORE=$(python3 -c "
      import json
      try:
          data = json.load(open('roam-health.json'))
          print(data.get('summary', {}).get('health_score', 0))
      except Exception:
          print(0)
      ")
      echo "Health score: ${HEALTH_SCORE}/100"

      if [ "${HEALTH_SCORE}" -lt "${ROAM_HEALTH_GATE}" ]; then
        echo "FAILED: Health score ${HEALTH_SCORE} is below gate threshold ${ROAM_HEALTH_GATE}"
        exit 1
      fi

    # Post MR comment (only on merge requests)
    - |
      if [ -n "${CI_MERGE_REQUEST_IID}" ]; then
        RULES_VERDICT=$(python3 -c "
      import json
      try:
          data = json.load(open('roam-rules.json'))
          v = data.get('summary', {}).get('verdict', 'unknown')
          violations = data.get('summary', {}).get('violations', 0)
          print(f'{v} ({violations} violations)')
      except Exception:
          print('not available')
      " 2>/dev/null || echo "not available")

        COMMENT_BODY=$(cat <<COMMENT_EOF
      ## roam-code Analysis

      | Metric | Value |
      |--------|-------|
      | Health Score | **${HEALTH_SCORE}/100** |
      | Gate Threshold | ${ROAM_HEALTH_GATE} |
      | Rules | ${RULES_VERDICT} |
      | Commit | \`${CI_COMMIT_SHORT_SHA}\` |

      <details>
      <summary>Details</summary>

      Run \`roam health\` and \`roam check-rules\` locally for full output.

      SARIF artifacts are available in the job artifacts.
      </details>

      ---
      *Generated by [roam-code](https://github.com/Cranot/roam-code) on $(date -u +%Y-%m-%dT%H:%M:%SZ)*
      COMMENT_EOF
        )

        curl --silent --fail \
          --header "PRIVATE-TOKEN: ${GITLAB_TOKEN:-${CI_JOB_TOKEN}}" \
          --header "Content-Type: application/json" \
          --data "$(python3 -c "import json; print(json.dumps({'body': '''${COMMENT_BODY}'''}))")" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
          > /dev/null || echo "Warning: Could not post MR comment (token may lack api scope)"
      fi
  artifacts:
    when: always
    paths:
      - roam-health.json
      - roam-rules.json
      - roam-health.sarif
      - roam-rules.sarif
    reports:
      # GitLab can ingest SARIF via Code Quality reports (Ultimate tier)
      # or as generic artifacts for download
      sast: roam-health.sarif
