id: python-path-traversal
description: Untrusted input flowing into filesystem operations without sanitisation. Maps to CWE-22 / OWASP A01:2021 Broken Access Control.
severity: error
cwe: CWE-22
owasp_top10: A01:2021_Broken_Access_Control
languages:
  - python
sources:
  - request.args
  - request.form
  - request.files
  - input
  # CLI-tool sources. A ``--config-path``-style option flowing into
  # ``open`` / ``pathlib.Path`` without ``os.path.normpath`` /
  # ``os.path.abspath`` is path-traversal in any tool that processes
  # user-supplied paths (CI, batch jobs, dev CLIs).
  - sys.argv
  - os.environ
  - argparse.parse_args
  - click.argument
  - click.option
sinks:
  - open
  - os.path.join
  - shutil.copy
  - shutil.move
  - pathlib.Path
sanitizers:
  - secure_filename
  - werkzeug.utils.secure_filename
  - os.path.normpath
  - os.path.abspath
