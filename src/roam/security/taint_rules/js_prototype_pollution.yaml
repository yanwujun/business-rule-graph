id: js-prototype-pollution
description: Untrusted input merged into existing objects (CWE-1321 Improperly Controlled Modification of Object Prototype Attributes). Maps to CWE-1321 / OWASP A08:2021 Software and Data Integrity Failures (OWASP 2021 explicitly enumerates CWE-1321 under A08).
severity: error
cwe: CWE-1321
owasp_top10: A08:2021_Software_and_Data_Integrity_Failures
languages:
  - javascript
  - typescript
sources:
  - req.query
  - req.body
  - req.params
  - location.search
  - URLSearchParams
  - JSON.parse
sinks:
  - Object.assign
  - lodash.merge
  - lodash.mergeWith
  - lodash.set
  - lodash.setWith
  - _.merge
  - _.mergeWith
  - _.set
  - _.setWith
  - $.extend
  - jQuery.extend
sanitizers:
  - sanitizeObject
  - reject_proto_keys
  - hasOwnProperty
