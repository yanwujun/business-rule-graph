id: js-ssrf
description: Untrusted URL flowing into outbound HTTP request. Maps to CWE-918 / OWASP A10:2021 Server-Side Request Forgery (the dedicated SSRF category added in OWASP 2021).
severity: warning
cwe: CWE-918
owasp_top10: A10:2021_Server_Side_Request_Forgery
languages:
  - javascript
  - typescript
sources:
  - req.query
  - req.body
  - req.params
sinks:
  - fetch
  - axios.get
  - axios.post
  - http.get
  - https.get
  - request.get
sanitizers:
  - validateUrl
  - urlAllowList
