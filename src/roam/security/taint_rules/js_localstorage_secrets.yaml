id: js-localstorage-secrets
description: Sensitive data (tokens, credentials, JWTs) stored in localStorage where an XSS gives an attacker exfil. Prefer httpOnly cookies or sessionStorage with care (CWE-922 Insecure Storage of Sensitive Information).
severity: warning
cwe: CWE-922
languages:
  - javascript
  - typescript
sources:
  - access_token
  - refresh_token
  - id_token
  - jwt
  - apiKey
  - api_key
  - password
  - secret
  - credentials
  - sessionToken
  - bearer
sinks:
  - localStorage.setItem
  - sessionStorage.setItem
sanitizers:
  - obfuscate
  - encryptForStorage
