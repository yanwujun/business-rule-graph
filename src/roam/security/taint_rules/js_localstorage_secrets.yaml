id: js-localstorage-secrets
description: Sensitive data (tokens, credentials, JWTs) stored in localStorage where an XSS gives an attacker exfil. Prefer httpOnly cookies or sessionStorage with care (CWE-922 Insecure Storage of Sensitive Information). Maps to CWE-922 / OWASP A04:2021 Insecure Design (the storage choice is a design-time mistake; OWASP 2021 lists CWE-922 under A04).
severity: warning
cwe: CWE-922
owasp_top10: A04:2021_Insecure_Design
languages:
  - javascript
  - typescript
sources:
  - access_token
  - refresh_token
  - id_token
  - jwt
  - apiKey
  - api_key
  - password
  - secret
  - credentials
  - sessionToken
  - bearer
sinks:
  - localStorage.setItem
  - sessionStorage.setItem
sanitizers:
  - obfuscate
  - encryptForStorage
