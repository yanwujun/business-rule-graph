id: python-command-injection
description: Untrusted user input flowing into shell-style command execution
severity: error
cwe: CWE-78
owasp_top10: A03:2021_Injection
languages:
  - python
sources:
  - request.args
  - request.form
  - request.GET
  - request.POST
  - request.json
  - input
  - sys.stdin
sinks:
  - subprocess.run
  - subprocess.call
  - subprocess.Popen
  - os.system
  - os.popen
  - eval
  - exec
sanitizers:
  - shlex.quote
  - shlex.split
