id: python-urllib-open-redirect
description: User-controlled URL into a redirect or fetch sink (open-redirect / SSRF). CodeQL 2.24 ships an equivalent urllib.parse model. Maps to CWE-601 / OWASP A01:2021 Broken Access Control (open redirect bypasses authorization boundaries).
severity: warning
cwe: CWE-601
owasp_top10: A01:2021_Broken_Access_Control
languages:
  - python
sources:
  - request.args
  - request.form
  - request.GET
  - request.POST
  - request.json
  - request.url
  - request.headers.get
sinks:
  - flask.redirect
  - django.shortcuts.redirect
  - HttpResponseRedirect
  - urllib.request.urlopen
  - urllib.request.Request
  - requests.get
  - requests.post
  - httpx.get
  - httpx.post
sanitizers:
  - urllib.parse.quote
  - urllib.parse.quote_plus
  - werkzeug.urls.url_fix
  - is_safe_url
  - validate_url
