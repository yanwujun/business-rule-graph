id: js-api-error-leak
description: Raw backend error.message returned to the client leaks stack traces, ORM details, and SQL fragments (CWE-209 Information Exposure Through an Error Message). Use a sanitised error wrapper. Maps to CWE-209 / OWASP A04:2021 Insecure Design (OWASP 2021 lists CWE-209 verbose error exposure under A04 — a design-time choice to return raw internals).
severity: warning
cwe: CWE-209
owasp_top10: A04:2021_Insecure_Design
languages:
  - javascript
  - typescript
sources:
  - error.message
  - err.message
  - exception.message
  - error.stack
  - err.stack
  - error.detail
sinks:
  # W1080: ``throw`` is a JS keyword (excluded from
  # ``_JS_KEYWORDS`` reference-extraction in
  # ``src/roam/languages/javascript_lang.py``) so it can NEVER appear
  # as a symbol name and the previous entry was a guaranteed no-op.
  # Dropped in favour of the real callable sinks that propagate the
  # raw error to the client: Express ``next(err)`` (forwards to the
  # error-handling middleware which by default exposes the message),
  # Promise rejection (``reject(err)`` / ``Promise.reject(err)``) which
  # propagates to the closest unhandled-rejection responder.
  - res.send
  - res.json
  - res.write
  - response.json
  - response.send
  - reply.send
  - context.json
  - next
  - reject
  - Promise.reject
sanitizers:
  - sanitizeError
  - publicError
  - userFacingError
  - toJSON
