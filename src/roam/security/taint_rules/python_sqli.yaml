id: python-sqli
description: Untrusted input concatenated into raw SQL. Maps to CWE-89 / OWASP A03:2021 Injection.
severity: error
cwe: CWE-89
owasp_top10: A03:2021_Injection
languages:
  - python
sources:
  - request.args
  - request.form
  - request.GET
  - request.POST
  - request.json
sinks:
  - cursor.execute
  - connection.execute
  - conn.execute
  - db.execute
  - session.execute
sanitizers:
  - sqlalchemy.bindparam
  - escape
