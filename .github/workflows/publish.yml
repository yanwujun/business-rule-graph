# Publish roam-code to PyPI using Trusted Publishing (OIDC).
#
# Triggers:
#   - push of any v* tag (the canonical path; wheel ships before release notes)
#   - GitHub Release creation (legacy compatibility — kept so manual draft-then-
#     publish still works; skip-existing makes the second invocation a no-op)
#   - manual workflow_dispatch (for re-runs after a failure)
#
# Setup: configure a "trusted publisher" on PyPI for this repo
# (https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/)
# before the first publish. No API tokens needed.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  id-token: write   # OIDC token for Trusted Publishing
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Twine check
        run: |
          pip install twine
          twine check --strict dist/*

      - name: Verify wheel ships PEP 639 License-Expression metadata
        # Pre-12.50 wheels shipped to PyPI with no license metadata
        # because the build ran on setuptools < 77 (which silently
        # drops the license expression). Block any future regression.
        run: |
          set -e
          unzip -p dist/*.whl '*/METADATA' \
            | grep -q '^License-Expression: Apache-2.0$' \
            || (echo "::error::License-Expression missing — needs setuptools >= 77" && exit 1)

      - name: Verify wheel contains v2 commands
        # Belt-and-suspenders: if the wheel is missing a v2 command file
        # (because pyproject package-data drifted), fail before PyPI sees it.
        run: |
          set -e
          unzip -l dist/*.whl | grep -E "(pr_analyze|metrics_push|audit_trail|rules_validate|dogfood)" | wc -l > .v2_count
          count=$(cat .v2_count)
          if [ "$count" -lt "8" ]; then
            echo "::error::Expected at least 8 v2 command files in wheel, got $count"
            exit 1
          fi

      - name: Generate CycloneDX SBOM
        # SBOM (Software Bill of Materials) for the published wheel.
        # CycloneDX is the format auditors and enterprise procurement
        # ask for under the audit-trail product.
        #
        # Method: build a fresh venv, install the just-built wheel
        # (so the resolved dependency closure matches what end users
        # get from ``pip install roam-code``), then run
        # ``cyclonedx-py environment`` against that venv. Running
        # cyclonedx against the CI build env would include build-only
        # tooling like ``build`` and ``twine`` which users never see.
        #
        # The SBOM lives in ``sbom/`` (NOT ``dist/``) so it doesn't
        # land in twine's upload set — twine validates filenames and
        # would reject .cdx.json.
        run: |
          set -e
          mkdir -p sbom
          version=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          python -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/pip install --quiet --upgrade pip
          /tmp/sbom-venv/bin/pip install --quiet cyclonedx-bom
          /tmp/sbom-venv/bin/pip install --quiet dist/*.whl
          /tmp/sbom-venv/bin/cyclonedx-py environment \
            /tmp/sbom-venv/bin/python \
            --of JSON \
            -o "sbom/roam-code-${version}.cdx.json"
          echo "SBOM written to sbom/roam-code-${version}.cdx.json"
          # Quick sanity: ensure roam-code itself appears in components.
          grep -q '"name": "roam-code"' "sbom/roam-code-${version}.cdx.json" \
            || (echo "::error::SBOM missing roam-code component" && exit 1)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload SBOM artifact
        # Separate artifact so downstream consumers (release notes
        # workflow, customers grabbing the SBOM directly) can fetch
        # it without pulling the wheel.
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # optional: use a GitHub environment for approval
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotency: when a manual twine upload already shipped the wheel,
          # the workflow should no-op cleanly instead of erroring on file collision.
          skip-existing: true

  smoke:
    # Post-publish: install the just-released package from PyPI in a
    # clean environment and run --version. Catches the class of failure
    # where the wheel passes local checks but PyPI's CDN serves the
    # wrong file or a packaging error breaks ``pip install`` post-upload.
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for CDN propagation
        # PyPI can take ~30s to surface a freshly-uploaded version on
        # the JSON API; pip's index resolver hits the same edge.
        run: sleep 45

      - name: Install + verify
        run: python scripts/verify_release.py --pypi --install

      - name: Verify production security headers
        run: python scripts/verify_release.py --headers
