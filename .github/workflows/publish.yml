# Publish roam-code to PyPI using Trusted Publishing (OIDC).
#
# Triggers:
#   - push of any v* tag (the canonical path; wheel ships before release notes)
#   - GitHub Release creation (legacy compatibility — kept so manual draft-then-
#     publish still works; skip-existing makes the second invocation a no-op)
#   - manual workflow_dispatch (for re-runs after a failure)
#
# Setup: configure a "trusted publisher" on PyPI for this repo
# (https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/)
# before the first publish. No API tokens needed.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  id-token: write   # OIDC token for Trusted Publishing
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Twine check
        run: |
          pip install twine
          twine check --strict dist/*

      - name: Verify wheel ships PEP 639 License-Expression metadata
        # Pre-12.50 wheels shipped to PyPI with no license metadata
        # because the build ran on setuptools < 77 (which silently
        # drops the license expression). Block any future regression.
        #
        # W1104: extract the wheel path to a variable + assert a single
        # match. The build currently produces one py3-none-any wheel; if
        # that ever changes (multi-arch, multi-py), the unquoted glob
        # would have been a silent footgun. Fail fast instead.
        run: |
          set -e
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -ne 1 ]; then
            echo "::error::Expected exactly 1 wheel in dist/, got ${#wheels[@]}: ${wheels[*]}"
            exit 1
          fi
          wheel="${wheels[0]}"
          unzip -p "$wheel" '*/METADATA' \
            | grep -q '^License-Expression: Apache-2.0$' \
            || (echo "::error::License-Expression missing — needs setuptools >= 77" && exit 1)

      - name: Verify wheel contains v2 commands
        # Belt-and-suspenders: if the wheel is missing a v2 command file
        # (because pyproject package-data drifted), fail before PyPI sees it.
        # W1104: same single-wheel assertion as the PEP 639 step above.
        run: |
          set -e
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -ne 1 ]; then
            echo "::error::Expected exactly 1 wheel in dist/, got ${#wheels[@]}: ${wheels[*]}"
            exit 1
          fi
          wheel="${wheels[0]}"
          unzip -l "$wheel" | grep -E "(pr_analyze|metrics_push|audit_trail|rules_validate|dogfood)" | wc -l > .v2_count
          count=$(cat .v2_count)
          if [ "$count" -lt "8" ]; then
            echo "::error::Expected at least 8 v2 command files in wheel, got $count"
            exit 1
          fi

      - name: Generate CycloneDX SBOM
        # SBOM (Software Bill of Materials) for the published wheel.
        # CycloneDX is the format auditors and enterprise procurement
        # ask for under the audit-trail product.
        #
        # Method: build a fresh venv, install the just-built wheel
        # (so the resolved dependency closure matches what end users
        # get from ``pip install roam-code``), then run
        # ``cyclonedx-py environment`` against that venv. Running
        # cyclonedx against the CI build env would include build-only
        # tooling like ``build`` and ``twine`` which users never see.
        #
        # The SBOM lives in ``sbom/`` (NOT ``dist/``) so it doesn't
        # land in twine's upload set — twine validates filenames and
        # would reject .cdx.json.
        run: |
          set -e
          mkdir -p sbom
          version=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          # W1104: assert single wheel before passing to pip; mirrors the
          # PEP 639 + v2-commands verification steps above.
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -ne 1 ]; then
            echo "::error::Expected exactly 1 wheel in dist/, got ${#wheels[@]}: ${wheels[*]}"
            exit 1
          fi
          wheel="${wheels[0]}"
          python -m venv /tmp/sbom-venv
          /tmp/sbom-venv/bin/pip install --quiet --upgrade pip
          /tmp/sbom-venv/bin/pip install --quiet cyclonedx-bom
          /tmp/sbom-venv/bin/pip install --quiet "$wheel"
          /tmp/sbom-venv/bin/cyclonedx-py environment \
            /tmp/sbom-venv/bin/python \
            --of JSON \
            -o "sbom/roam-code-${version}.cdx.json"
          echo "SBOM written to sbom/roam-code-${version}.cdx.json"
          # Quick sanity: ensure roam-code itself appears in components.
          grep -q '"name": "roam-code"' "sbom/roam-code-${version}.cdx.json" \
            || (echo "::error::SBOM missing roam-code component" && exit 1)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload SBOM artifact
        # Separate artifact so downstream consumers (release notes
        # workflow, customers grabbing the SBOM directly) can fetch
        # it without pulling the wheel.
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi          # optional: use a GitHub environment for approval
    permissions:
      id-token: write
      contents: write   # upload SBOM as a release asset
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifact
        # Pull the SBOM produced in the ``build`` job back into this job
        # so it's on disk for the release-asset upload + signing steps.
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotency: when a manual twine upload already shipped the wheel,
          # the workflow should no-op cleanly instead of erroring on file collision.
          skip-existing: true

      - name: Install cosign
        # Only needed for tag-driven runs; the install is cheap enough
        # to do unconditionally and skip the actual sign step below.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM with cosign (keyless OIDC)
        # Same Sigstore chain as ``cga emit --sign --keyless``: GitHub OIDC
        # token → Fulcio short-lived cert → Rekor transparency log. Produces
        # a sibling ``.sig`` file that procurement can verify with
        # ``cosign verify-blob --certificate <crt> <file>``.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -e
          for f in sbom/*.cdx.json; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" \
              "$f"
          done
          ls -la sbom/

      - name: Upload SBOM to GitHub Release
        # Attach the CycloneDX SBOM (and its cosign sig + cert when present)
        # to the GitHub Release that triggered this run. This is the
        # canonical fetch path for procurement under the audit-trail
        # product narrative — workflow artifacts expire after 90 days,
        # release assets do not.
        #
        # Only run on tag-triggered events: workflow_dispatch / release
        # webhooks may not have a clean tag context.
        #
        # v13.2 fix (W1047): the publish job has no actions/checkout, so
        # ``gh release`` falls back to ``git`` for repo context and dies
        # with "fatal: not a git repository". Pass ``--repo`` explicitly.
        # Also: pushing a git tag does NOT auto-create a GitHub Release;
        # only the ``release: published`` trigger does. So tag-pushed runs
        # need to create the release before uploading assets. Idempotent
        # via ``gh release view ... || gh release create ...``.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # Ensure the GitHub Release exists before uploading assets.
          # Idempotent: if the release was already created (e.g. by a
          # ``release: published`` trigger or by a previous workflow run
          # via workflow_dispatch), the view succeeds and the create is
          # skipped.
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes
          # --clobber makes the upload idempotent — re-running the workflow
          # for the same tag overwrites the previous asset rather than 422-ing.
          gh release upload "$TAG" sbom/*.cdx.json --repo "$REPO" --clobber
          # Best-effort: upload cosign sig + cert if they exist. ls returns
          # nothing if the cosign step was skipped, in which case the loop
          # body never runs.
          for sig in sbom/*.sig sbom/*.crt; do
            [ -f "$sig" ] && gh release upload "$TAG" "$sig" --repo "$REPO" --clobber || true
          done

      - name: Verify SBOM is attached to the release
        # Sanity check: the GitHub API must list the .cdx.json file in
        # the release's assets array. Catches the class of failure where
        # ``gh release upload`` exits 0 but the asset never lands (e.g.
        # token scoping, rate-limit edge case, or someone deleting the
        # release between upload and check).
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          assets=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.assets[].name')
          echo "Release assets:"
          echo "$assets"
          echo "$assets" | grep -q '\.cdx\.json$' \
            || (echo "::error::SBOM .cdx.json not found among release assets" && exit 1)

  smoke:
    # Post-publish: install the just-released package from PyPI in a
    # clean environment and run --version. Catches the class of failure
    # where the wheel passes local checks but PyPI's CDN serves the
    # wrong file or a packaging error breaks ``pip install`` post-upload.
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install + verify (with CDN-propagation retry)
        # W1089: PyPI's CDN can take 30-90s to surface a freshly-uploaded
        # version; pip's index resolver hits the same edge. Retry with
        # exponential backoff instead of a fixed ``sleep 45`` — fast path
        # exits in ~10s when CDN is already warm; slow path covers the
        # tail without over-waiting on the common case. Cumulative cap
        # 160s before final attempt fails the step.
        run: |
          set +e
          for delay in 10 15 30 45 60; do
            python scripts/verify_release.py --pypi --install && exit 0
            echo "::notice::CDN not warm yet — retrying in ${delay}s"
            sleep "$delay"
          done
          set -e
          python scripts/verify_release.py --pypi --install

      - name: Verify production security headers
        run: python scripts/verify_release.py --headers
