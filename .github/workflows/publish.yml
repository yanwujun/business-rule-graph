# Publish roam-code to PyPI with a manifest-bound, fail-closed provenance path.
#
# Security invariants:
#   1. Resolve one constrained v* tag to one commit and build exactly once.
#   2. Move one wheel, one sdist, their SBOM, and a digest manifest through an
#      immutable Actions artifact; move only a proven missing-file subset
#      through a second immutable artifact. Download both strictly by ID.
#   3. Recompute every digest before the OIDC-backed publish action runs.
#   4. Recover a partial PyPI upload only when every existing file is an exact
#      filename/digest/size subset of the manifest, then upload only missing
#      files. Duplicate uploads and every non-subset state remain hard errors.
#   5. Ask the pinned PyPA action to attest only newly missing verified files,
#      then require valid PyPI digests and provenance subjects for the complete
#      wheel/sdist pair before attaching signed evidence to the release.
#
# The canonical trigger is a tag push. workflow_dispatch can safely recover a
# partially accepted wheel/sdist pair, but only from byte-identical manifest
# evidence. Post-publish jobs should still be retried in their original run.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish (for example v13.9.0)"
        required: true
        type: string

# One global release lock avoids races across tag-push and manual runs without
# interpolating an untrusted workflow input into the concurrency key.
concurrency:
  group: publish-roam-code
  cancel-in-progress: false

# Build and resolution jobs never receive an OIDC token. Privileged permissions
# are granted only to the two jobs that need them.
permissions:
  contents: read

jobs:
  resolve-ref:
    name: Resolve immutable release identity
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve and pin the release tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_REF_NAME: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          RUN_REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          IMMUTABLE_RELEASES_ENABLED: ${{ vars.IMMUTABLE_RELEASES_ENABLED }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            push) tag="$PUSH_REF_NAME" ;;
            workflow_dispatch) tag="$DISPATCH_TAG" ;;
            *)
              echo "::error::Unsupported publish trigger: $EVENT_NAME"
              exit 1
              ;;
          esac

          # This allowlist rejects whitespace, slashes, shell metacharacters,
          # query fragments, and multiline-output injection. It accepts the
          # project's numeric release tags plus conventional PEP 440 pre/post
          # suffixes.
          tag_pattern='^v[0-9]+([.][0-9]+)+((a|b|rc)[0-9]+)?([.]post[0-9]+)?([.]dev[0-9]+)?$'
          if [[ ! "$tag" =~ $tag_pattern ]]; then
            echo "::error::Release tag is outside the allowed format: '$tag'"
            exit 1
          fi
          if [[ ! "$REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "::error::Repository identity has an unexpected format."
            exit 1
          fi
          if [[ "$EVENT_NAME" == push && "$RUN_REF" != "refs/tags/$tag" ]]; then
            echo "::error::Tag-push release identity does not match GITHUB_REF."
            exit 1
          fi
          if [[ "$EVENT_NAME" == workflow_dispatch && "$RUN_REF" != "refs/heads/$DEFAULT_BRANCH" ]]; then
            echo "::error::Manual recovery must run from the repository default branch."
            exit 1
          fi

          # GITHUB_TOKEN cannot read the administration-scoped repository
          # setting directly. Require an explicit operator assertion before any
          # build, then prove the resulting release's immutable=true state after
          # draft publication. Keep this variable synchronized with the setting.
          if [[ "$IMMUTABLE_RELEASES_ENABLED" != true ]]; then
            echo "::error::Set repository variable IMMUTABLE_RELEASES_ENABLED=true only after enabling immutable releases."
            exit 1
          fi

          ref_json=$(gh api "repos/${REPO}/git/ref/tags/${tag}")
          object_type=$(jq -r '.object.type' <<<"$ref_json")
          sha=$(jq -r '.object.sha' <<<"$ref_json")

          # Dereference annotated (including nested annotated) tags with a
          # finite bound, then require a lowercase full commit SHA.
          for _depth in 1 2 3 4 5; do
            if [[ "$object_type" == "commit" ]]; then
              break
            fi
            if [[ "$object_type" != "tag" || ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::Tag '$tag' resolves to unsupported object '$object_type' ($sha)."
              exit 1
            fi
            tag_json=$(gh api "repos/${REPO}/git/tags/${sha}")
            object_type=$(jq -r '.object.type' <<<"$tag_json")
            sha=$(jq -r '.object.sha' <<<"$tag_json")
          done
          if [[ "$object_type" != "commit" || ! "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Tag '$tag' did not resolve to one full commit SHA."
            exit 1
          fi

          echo "Resolved release target: tag=$tag commit=$sha"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"

  build:
    name: Build reproducible manifest-bound artifacts
    needs: resolve-ref
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    outputs:
      artifact_id: ${{ steps.upload_bundle.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload_bundle.outputs.artifact-digest }}
      manifest_sha256: ${{ steps.release_manifest.outputs.sha256 }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ needs.resolve-ref.outputs.sha }}
          persist-credentials: false

      - name: Confirm checkout is the resolved commit
        env:
          EXPECTED_SHA: ${{ needs.resolve-ref.outputs.sha }}
        run: |
          set -euo pipefail
          actual_sha=$(git rev-parse HEAD)
          if [[ "$actual_sha" != "$EXPECTED_SHA" ]]; then
            echo "::error::Checked-out HEAD $actual_sha != resolved commit $EXPECTED_SHA"
            exit 1
          fi

      - name: Bind reproducible build inputs to the commit
        run: |
          set -euo pipefail
          source_date_epoch=$(git show -s --format=%ct HEAD)
          if [[ ! "$source_date_epoch" =~ ^[0-9]+$ ]]; then
            echo "::error::Tagged commit did not provide a valid source epoch."
            exit 1
          fi
          printf 'SOURCE_DATE_EPOCH=%s\n' "$source_date_epoch" >> "$GITHUB_ENV"
          printf 'PYTHONHASHSEED=0\nTZ=UTC\nLC_ALL=C.UTF-8\n' >> "$GITHUB_ENV"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install the hash-locked release toolchain
        run: |
          set -euo pipefail
          lock=.github/release-tools.lock
          wheelhouse=/tmp/release-wheelhouse
          toolenv=/tmp/release-tools
          if [[ -e "$wheelhouse" || -L "$wheelhouse" || -e "$toolenv" || -L "$toolenv" ]]; then
            echo "::error::Release toolchain paths are not fresh."
            exit 1
          fi
          mkdir -m 0700 "$wheelhouse"
          python -m venv "$toolenv"
          "$toolenv/bin/python" -m pip download \
            --disable-pip-version-check \
            --require-hashes \
            --only-binary=:all: \
            --dest "$wheelhouse" \
            --requirement "$lock"
          "$toolenv/bin/python" -m pip install \
            --disable-pip-version-check \
            --require-hashes \
            --only-binary=:all: \
            --force-reinstall \
            --no-index \
            --find-links "$wheelhouse" \
            --requirement "$lock"
          printf '%s\n' "$toolenv/bin" >> "$GITHUB_PATH"

      - name: Build wheel and sdist once
        run: python -m build --no-isolation --outdir dist

      - name: Canonicalize the sdist for byte-identical recovery builds
        run: |
          set -euo pipefail
          sdists=(dist/*.tar.gz)
          [[ ${#sdists[@]} -eq 1 ]] || { echo "::error::Expected one sdist to canonicalize."; exit 1; }
          python scripts/release_artifacts.py canonicalize-sdist \
            --sdist "${sdists[0]}" \
            --source-date-epoch "$SOURCE_DATE_EPOCH"

      - name: Validate distribution metadata
        run: |
          set -euo pipefail
          dists=(dist/*)
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          if [[ ${#dists[@]} -ne 2 || ${#wheels[@]} -ne 1 || ${#sdists[@]} -ne 1 ]]; then
            echo "::error::Expected exactly one wheel and one sdist in dist/."
            printf 'Found: %s\n' "${dists[@]}"
            exit 1
          fi
          python -m twine check --strict "${dists[@]}"

      - name: Verify wheel ships PEP 639 license metadata
        run: |
          set -euo pipefail
          wheels=(dist/*.whl)
          [[ ${#wheels[@]} -eq 1 ]] || exit 1
          metadata=$(unzip -p "${wheels[0]}" '*/METADATA')
          grep -q '^License-Expression: Apache-2.0$' <<<"$metadata" \
            || { echo "::error::License-Expression metadata is missing."; exit 1; }

      - name: Verify wheel contains v2 commands
        run: |
          set -euo pipefail
          wheels=(dist/*.whl)
          [[ ${#wheels[@]} -eq 1 ]] || exit 1
          listing=$(unzip -l "${wheels[0]}")
          count=$(awk '/pr_analyze|metrics_push|audit_trail|rules_validate|dogfood/ { count++ } END { print count + 0 }' <<<"$listing")
          if [[ "$count" -lt 8 ]]; then
            echo "::error::Expected at least 8 v2 command files in the wheel; found $count."
            exit 1
          fi

      - name: Generate runtime CycloneDX SBOM
        run: |
          set -euo pipefail
          wheels=(dist/*.whl)
          [[ ${#wheels[@]} -eq 1 ]] || exit 1
          version=$(python -c "import pathlib,tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          mkdir -p sbom

          # The generator is part of the hash-locked toolchain. The target
          # environment receives the wheel plus runtime dependencies solely
          # from that lock's already hash-verified, no-index wheelhouse.
          python -m venv --without-pip /tmp/sbom-target
          python -m pip --python /tmp/sbom-target/bin/python install \
            --disable-pip-version-check \
            --only-binary=:all: \
            --no-index \
            --find-links /tmp/release-wheelhouse \
            "${wheels[0]}"
          sbom_path="sbom/roam-code-${version}.cdx.json"
          cyclonedx-py environment \
            /tmp/sbom-target/bin/python \
            --output-reproducible \
            --of JSON \
            -o "$sbom_path"
          grep -q '"name": "roam-code"' "$sbom_path" \
            || { echo "::error::SBOM is missing the roam-code component."; exit 1; }

      - name: Bind exact artifact and SBOM digests
        id: release_manifest
        env:
          TAG: ${{ needs.resolve-ref.outputs.tag }}
          EXPECTED_SHA: ${{ needs.resolve-ref.outputs.sha }}
        run: |
          set -euo pipefail
          sboms=(sbom/*.cdx.json)
          if [[ ${#sboms[@]} -ne 1 ]]; then
            echo "::error::Expected exactly one CycloneDX SBOM; found ${#sboms[@]}."
            exit 1
          fi
          mkdir -p release
          python scripts/release_artifacts.py prepare \
            --dist-dir dist \
            --sbom "${sboms[0]}" \
            --manifest release/release-manifest.json \
            --tag "$TAG" \
            --commit "$EXPECTED_SHA"
          python scripts/release_artifacts.py verify \
            --dist-dir dist \
            --sbom "${sboms[0]}" \
            --manifest release/release-manifest.json \
            --tag "$TAG" \
            --commit "$EXPECTED_SHA"
          manifest_sha256=$(sha256sum release/release-manifest.json | awk '{print $1}')
          printf 'sha256=%s\n' "$manifest_sha256" >> "$GITHUB_OUTPUT"
          echo "Release manifest SHA256: $manifest_sha256"

      - name: Upload one immutable release bundle
        id: upload_bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-bundle
          path: |
            dist/
            sbom/
            release/release-manifest.json
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30

  recover:
    name: Materialize the exact missing PyPI subset
    needs: [resolve-ref, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      publish_required: ${{ steps.recovery.outputs.publish_required }}
      artifact_id: ${{ steps.upload_subset.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload_subset.outputs.artifact-digest }}
    steps:
      - name: Check out the resolved recovery helper
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ needs.resolve-ref.outputs.sha }}
          persist-credentials: false
          path: release-source

      - name: Confirm recovery helper is from the resolved commit
        env:
          EXPECTED_SHA: ${{ needs.resolve-ref.outputs.sha }}
        run: |
          set -euo pipefail
          actual_sha=$(git -C release-source rev-parse HEAD)
          if [[ "$actual_sha" != "$EXPECTED_SHA" ]]; then
            echo "::error::Recovery helper checkout differs from the resolved release commit."
            exit 1
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Download the immutable release bundle by artifact ID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: release-bundle

      - name: Materialize an exact-subset PyPI recovery set
        id: recovery
        env:
          TAG: ${{ needs.resolve-ref.outputs.tag }}
          EXPECTED_SHA: ${{ needs.resolve-ref.outputs.sha }}
          EXPECTED_MANIFEST_SHA256: ${{ needs.build.outputs.manifest_sha256 }}
        run: |
          set -euo pipefail
          manifest="release-bundle/release/release-manifest.json"
          if [[ ! "$EXPECTED_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ \
            || "$(sha256sum "$manifest" | awk '{print $1}')" != "$EXPECTED_MANIFEST_SHA256" ]]; then
            echo "::error::Recovery input manifest differs from the build output."
            exit 1
          fi
          version=$(jq -r '.version' "$manifest")
          response=$(mktemp /tmp/roam-pypi-preflight.XXXXXXXXXX)
          if ! status=$(curl \
            --silent --show-error \
            --proto '=https' --tlsv1.2 \
            --connect-timeout 10 --max-time 30 \
            --max-filesize 16777216 \
            --retry 3 --retry-all-errors \
            --output "$response" --write-out '%{http_code}' \
            "https://pypi.org/pypi/roam-code/${version}/json"); then
            echo "::error::Could not retrieve definitive PyPI recovery state."
            exit 1
          fi
          case "$status" in
            200|404) ;;
            *)
              echo "::error::PyPI recovery requires HTTP 200 or 404; got $status."
              exit 1
              ;;
          esac

          plan=$(python release-source/scripts/release_artifacts.py recover \
            --dist-dir release-bundle/dist \
            --manifest "$manifest" \
            --pypi-response "$response" \
            --http-status "$status" \
            --output-dir release-bundle/publish-dist \
            --tag "$TAG" \
            --commit "$EXPECTED_SHA")
          jq -e '
            .schema == "roam.pypi-recovery/v1" and
            (.existing | type == "array") and
            (.missing | type == "array") and
            (.publish_required | type == "boolean") and
            .publish_required == ((.missing | length) > 0)
          ' <<<"$plan" >/dev/null
          publish_required=$(jq -r '.publish_required' <<<"$plan")
          printf 'publish_required=%s\n' "$publish_required" >> "$GITHUB_OUTPUT"
          echo "Exact-subset recovery plan: $plan"

      - name: Upload the immutable missing-file subset
        id: upload_subset
        if: steps.recovery.outputs.publish_required == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pypi-publish-subset
          path: release-bundle/publish-dist/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30

  publish:
    name: Publish the exact PyPI subset
    needs: [resolve-ref, build, recover]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/roam-code/
    permissions:
      contents: read   # allow the publisher action to resolve repository identity
      id-token: write  # exchange GitHub OIDC for PyPI Trusted Publishing
    steps:
      - name: Download the immutable bundle by artifact ID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: release-bundle

      - name: Verify exact bundle before requesting publish credentials
        env:
          TAG: ${{ needs.resolve-ref.outputs.tag }}
          EXPECTED_SHA: ${{ needs.resolve-ref.outputs.sha }}
          EXPECTED_MANIFEST_SHA256: ${{ needs.build.outputs.manifest_sha256 }}
          ACTIONS_ARTIFACT_SHA256: ${{ needs.build.outputs.artifact_digest }}
        run: |
          set -euo pipefail
          manifest="release-bundle/release/release-manifest.json"
          dist_dir="release-bundle/dist"

          strict_json_file() {
            local path="$1" max_bytes="$2" label="$3" size links
            [[ -f "$path" && ! -L "$path" ]] \
              || { echo "::error::$label is not a regular file."; return 1; }
            size=$(stat -c '%s' "$path")
            links=$(stat -c '%h' "$path")
            [[ "$size" =~ ^[0-9]+$ && "$size" -gt 0 && "$size" -le "$max_bytes" && "$links" == 1 ]] \
              || { echo "::error::$label violates its size or hardlink boundary."; return 1; }
            python3 -I -S - "$path" <<'PY'
          import json
          import sys

          def strict_object(pairs):
              result = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate JSON key: {key!r}")
                  result[key] = value
              return result

          def invalid_constant(value):
              raise ValueError(f"non-standard JSON constant: {value}")

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              json.load(handle, object_pairs_hook=strict_object, parse_constant=invalid_constant)
          PY
          }

          strict_json_file "$manifest" 1048576 "release manifest"

          if [[ ! "$EXPECTED_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Build did not emit a valid manifest digest."
            exit 1
          fi
          if [[ ! "$ACTIONS_ARTIFACT_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Actions did not emit a valid immutable-archive digest."
            exit 1
          fi
          actual_manifest_sha256=$(sha256sum "$manifest" | awk '{print $1}')
          if [[ "$actual_manifest_sha256" != "$EXPECTED_MANIFEST_SHA256" ]]; then
            echo "::error::Downloaded manifest digest differs from the build output."
            exit 1
          fi

          jq -e --arg tag "$TAG" --arg commit "$EXPECTED_SHA" '
            . as $m |
            $m.version as $version |
            type == "object" and
            (keys == ["artifacts", "commit", "project", "publish_predicate", "sbom", "schema", "tag", "version"]) and
            $m.schema == "roam.release-artifacts/v1" and
            $m.project == "roam-code" and
            $m.publish_predicate == "https://docs.pypi.org/attestations/publish/v1" and
            $m.tag == $tag and $m.commit == $commit and
            $m.tag == ("v" + $version) and
            ($version | test("^[0-9]+([.][0-9]+)+((a|b|rc)[0-9]+)?([.]post[0-9]+)?([.]dev[0-9]+)?$")) and
            ($m.artifacts | type == "array" and length == 2) and
            ([$m.artifacts[].kind] | sort == ["sdist", "wheel"]) and
            all($m.artifacts[];
              (keys == ["filename", "kind", "provenance_url", "sha256", "size"]) and
              (.filename | test("^[A-Za-z0-9][A-Za-z0-9._+-]*$")) and
              (.sha256 | test("^[0-9a-f]{64}$")) and
              (.size | type == "number" and . > 0 and . <= 104857600 and floor == .) and
              .provenance_url == ("https://pypi.org/integrity/roam-code/" + $version + "/" + .filename + "/provenance")
            ) and
            ($m.sbom | type == "object" and keys == ["filename", "sha256", "size"]) and
            ($m.sbom.filename | test("^[A-Za-z0-9][A-Za-z0-9._+-]*[.]cdx[.]json$")) and
            ($m.sbom.sha256 | test("^[0-9a-f]{64}$")) and
            ($m.sbom.size | type == "number" and . > 0 and . <= 67108864 and floor == .)
          ' "$manifest" >/dev/null

          jq -r '.artifacts[].filename' "$manifest" | LC_ALL=C sort > /tmp/expected-dist-files
          find "$dist_dir" -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort > /tmp/actual-dist-files
          if ! diff -u /tmp/expected-dist-files /tmp/actual-dist-files; then
            echo "::error::Downloaded dist/ contains a missing or unmanifested entry."
            exit 1
          fi

          while IFS=$'\t' read -r filename expected_digest expected_size; do
            path="$dist_dir/$filename"
            if [[ ! -f "$path" || -L "$path" || "$(stat -c '%h' "$path")" != 1 ]]; then
              echo "::error::Distribution is not a regular file: $filename"
              exit 1
            fi
            actual_size=$(stat -c '%s' "$path")
            if [[ ! "$actual_size" =~ ^[0-9]+$ || "$actual_size" -le 0 || "$actual_size" -gt 104857600 ]]; then
              echo "::error::Distribution exceeds the publish size boundary: $filename"
              exit 1
            fi
            actual_digest=$(sha256sum "$path" | awk '{print $1}')
            if [[ "$actual_digest" != "$expected_digest" || "$actual_size" != "$expected_size" ]]; then
              echo "::error::Distribution digest/size mismatch: $filename"
              exit 1
            fi
          done < <(jq -r '.artifacts[] | [.filename, .sha256, (.size | tostring)] | @tsv' "$manifest")

          sbom_name=$(jq -r '.sbom.filename' "$manifest")
          sbom="release-bundle/sbom/$sbom_name"
          printf '%s\n' "$sbom_name" > /tmp/expected-sbom-files
          find release-bundle/sbom -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort > /tmp/actual-sbom-files
          if ! diff -u /tmp/expected-sbom-files /tmp/actual-sbom-files; then
            echo "::error::Downloaded sbom/ contains a missing or unmanifested entry."
            exit 1
          fi
          if [[ ! -f "$sbom" || -L "$sbom" ]]; then
            echo "::error::Manifested SBOM is missing or is a symlink."
            exit 1
          fi
          strict_json_file "$sbom" 67108864 "release SBOM"
          sbom_digest=$(sha256sum "$sbom" | awk '{print $1}')
          sbom_size=$(stat -c '%s' "$sbom")
          if [[ "$sbom_digest" != "$(jq -r '.sbom.sha256' "$manifest")" || "$sbom_size" != "$(jq -r '.sbom.size' "$manifest")" ]]; then
            echo "::error::SBOM digest/size differs from the release manifest."
            exit 1
          fi

          jq -e --slurpfile manifest "$manifest" '
            $manifest[0] as $m |
            ($m.artifacts[] | select(.kind == "wheel")) as $wheel |
            ($m.artifacts[] | select(.kind == "sdist")) as $sdist |
            def prop($name): [.metadata.properties[]? | select(.name == $name) | .value];
            ([.components[]?, .metadata.component?] |
              map(select(type == "object" and .name == "roam-code" and .version == $m.version))) as $components |
            .bomFormat == "CycloneDX" and
            ($components | length > 0) and
            all($components[];
              ([.hashes[]? | select(.alg == "SHA-256" and .content == $wheel.sha256)] | length) == 1
            ) and
            prop("roam:release_manifest_schema") == [$m.schema] and
            prop("roam:release_tag") == [$m.tag] and
            prop("roam:release_commit") == [$m.commit] and
            prop("roam:release_wheel_filename") == [$wheel.filename] and
            prop("roam:release_wheel_sha256") == [$wheel.sha256] and
            prop("roam:release_wheel_provenance") == [$wheel.provenance_url] and
            prop("roam:release_sdist_filename") == [$sdist.filename] and
            prop("roam:release_sdist_sha256") == [$sdist.sha256] and
            prop("roam:release_sdist_provenance") == [$sdist.provenance_url]
          ' "$sbom" >/dev/null

          echo "Actions immutable-archive digest: $ACTIONS_ARTIFACT_SHA256"
          echo "Verified release manifest and exact wheel/sdist/SBOM digests."

      - name: Download the immutable missing-file subset by artifact ID
        if: needs.recover.outputs.publish_required == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.recover.outputs.artifact_id }}
          path: publish-subset

      - name: Re-resolve tag immediately before PyPI publication
        if: needs.recover.outputs.publish_required == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-ref.outputs.tag }}
          EXPECTED_SHA: ${{ needs.resolve-ref.outputs.sha }}
          EXPECTED_MANIFEST_SHA256: ${{ needs.build.outputs.manifest_sha256 }}
          SUBSET_ARTIFACT_SHA256: ${{ needs.recover.outputs.artifact_digest }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref_json=$(gh api "repos/${REPO}/git/ref/tags/${TAG}")
          object_type=$(jq -r '.object.type' <<<"$ref_json")
          actual_sha=$(jq -r '.object.sha' <<<"$ref_json")
          for _depth in 1 2 3 4 5; do
            [[ "$object_type" == commit ]] && break
            if [[ "$object_type" != tag || ! "$actual_sha" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::Release tag changed to an unsupported object before PyPI publication."
              exit 1
            fi
            tag_json=$(gh api "repos/${REPO}/git/tags/${actual_sha}")
            object_type=$(jq -r '.object.type' <<<"$tag_json")
            actual_sha=$(jq -r '.object.sha' <<<"$tag_json")
          done
          if [[ "$object_type" != commit || "$actual_sha" != "$EXPECTED_SHA" ]]; then
            echo "::error::Release tag no longer identifies the manifest commit before PyPI publication."
            exit 1
          fi

          manifest=release-bundle/release/release-manifest.json
          publish_dir=publish-subset
          if [[ ! "$EXPECTED_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ \
            || "$(sha256sum "$manifest" | awk '{print $1}')" != "$EXPECTED_MANIFEST_SHA256" ]]; then
            echo "::error::Manifest anchor changed before PyPI publication."
            exit 1
          fi
          if [[ ! "$SUBSET_ARTIFACT_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::Recovery job did not emit an immutable subset digest."
            exit 1
          fi
          if [[ ! -d "$publish_dir" || -L "$publish_dir" ]]; then
            echo "::error::Recovery publish set is not a real directory."
            exit 1
          fi
          mapfile -d '' publish_files < <(find "$publish_dir" -mindepth 1 -maxdepth 1 -print0)
          if [[ ${#publish_files[@]} -lt 1 || ${#publish_files[@]} -gt 2 ]]; then
            echo "::error::Recovery publish set must contain one or two files."
            exit 1
          fi
          for path in "${publish_files[@]}"; do
            [[ -f "$path" && ! -L "$path" && "$(stat -c '%h' "$path")" == 1 ]] \
              || { echo "::error::Recovery entry is not a singly-linked regular file."; exit 1; }
            filename=$(basename "$path")
            expected_digest=$(jq -er --arg filename "$filename" \
              '.artifacts[] | select(.filename == $filename) | .sha256' "$manifest")
            expected_size=$(jq -er --arg filename "$filename" \
              '.artifacts[] | select(.filename == $filename) | .size' "$manifest")
            actual_size=$(stat -c '%s' "$path")
            [[ "$actual_size" =~ ^[0-9]+$ && "$actual_size" -gt 0 && "$actual_size" -le 104857600 ]] \
              || { echo "::error::Recovery entry exceeds the publish size boundary."; exit 1; }
            [[ "$(sha256sum "$path" | awk '{print $1}')" == "$expected_digest" ]] || exit 1
            [[ "$actual_size" == "$expected_size" ]] || exit 1
          done
          echo "Missing-file immutable-archive digest: $SUBSET_ARTIFACT_SHA256"
          echo "Revalidated every missing distribution immediately before PyPI publication."

      - name: Publish only missing verified files with PEP 740 attestations
        if: needs.recover.outputs.publish_required == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: publish-subset/
          verify-metadata: true
          skip-existing: false
          print-hash: true
          attestations: true

  sign-evidence:
    name: Verify and sign release evidence
    needs: [resolve-ref, build, publish]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      artifact_id: ${{ steps.upload_signed_evidence.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload_signed_evidence.outputs.artifact-digest }}
    permissions:
      contents: read   # re-resolve the release tag before each signature
      id-token: write  # obtain the keyless Fulcio certificate for cosign
    steps:
      - name: Check out the resolved verifier lock
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ needs.resolve-ref.outputs.sha }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install the hash-locked PyPI provenance verifier
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_NO_INPUT: "1"
        run: |
          set -euo pipefail
          unset ACTIONS_ID_TOKEN_REQUEST_TOKEN ACTIONS_ID_TOKEN_REQUEST_URL
          lock=.github/release-tools.lock
          toolroot=$(mktemp -d "${RUNNER_TEMP}/roam-pypi-verifier.XXXXXXXXXX")
          chmod 0700 "$toolroot"
          if [[ ! -d "$toolroot" || -L "$toolroot" || "$(stat -c '%a' "$toolroot")" != 700 ]]; then
            echo "::error::PyPI provenance verifier root is not private."
            exit 1
          fi
          wheelhouse="$toolroot/wheelhouse"
          verifierenv="$toolroot/venv"
          mkdir -m 0700 "$wheelhouse"
          python -m venv "$verifierenv"
          timeout --foreground --signal=TERM --kill-after=10s 240s \
            "$verifierenv/bin/python" -m pip download \
              --disable-pip-version-check \
              --require-hashes \
              --only-binary=:all: \
              --timeout 15 \
              --retries 2 \
              --dest "$wheelhouse" \
              --requirement "$lock"
          timeout --foreground --signal=TERM --kill-after=10s 180s \
            "$verifierenv/bin/python" -m pip install \
              --disable-pip-version-check \
              --require-hashes \
              --only-binary=:all: \
              --force-reinstall \
              --no-index \
              --find-links "$wheelhouse" \
              --requirement "$lock"
          "$verifierenv/bin/python" -m pip check
          verifier_version=$("$verifierenv/bin/pypi-attestations" --version)
          if [[ "$verifier_version" != "pypi-attestations 0.0.29" ]]; then
            echo "::error::Unexpected PyPI provenance verifier: $verifier_version"
            exit 1
          fi
          printf '%s\n' "$verifierenv/bin" >> "$GITHUB_PATH"

      - name: Download the published bundle by artifact ID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: release-bundle

      - name: Recheck the manifest anchor
        env:
          TAG: ${{ needs.resolve-ref.outputs.tag }}
          EXPECTED_SHA: ${{ needs.resolve-ref.outputs.sha }}
          EXPECTED_MANIFEST_SHA256: ${{ needs.build.outputs.manifest_sha256 }}
        run: |
          set -euo pipefail
          manifest="release-bundle/release/release-manifest.json"
          [[ -f "$manifest" && ! -L "$manifest" && "$(stat -c '%h' "$manifest")" == 1 ]] || exit 1
          manifest_size=$(stat -c '%s' "$manifest")
          [[ "$manifest_size" =~ ^[0-9]+$ && "$manifest_size" -gt 0 && "$manifest_size" -le 1048576 ]] || exit 1
          python3 -I -S - "$manifest" <<'PY'
          import json
          import sys

          def strict_object(pairs):
              result = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate JSON key: {key!r}")
                  result[key] = value
              return result

          def invalid_constant(value):
              raise ValueError(f"non-standard JSON constant: {value}")

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              json.load(handle, object_pairs_hook=strict_object, parse_constant=invalid_constant)
          PY
          actual_manifest_sha256=$(sha256sum "$manifest" | awk '{print $1}')
          if [[ ! "$EXPECTED_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ || "$actual_manifest_sha256" != "$EXPECTED_MANIFEST_SHA256" ]]; then
            echo "::error::Release-evidence manifest differs from the build output."
            exit 1
          fi
          jq -e --arg tag "$TAG" --arg commit "$EXPECTED_SHA" '
            .schema == "roam.release-artifacts/v1" and
            .project == "roam-code" and
            .tag == $tag and .commit == $commit and
            (.artifacts | length == 2) and
            ([.artifacts[].kind] | sort == ["sdist", "wheel"]) and
            all(.artifacts[];
              (.filename | test("^[A-Za-z0-9][A-Za-z0-9._+-]*$")) and
              (.sha256 | test("^[0-9a-f]{64}$")) and
              (.size | type == "number" and . > 0 and . <= 104857600 and floor == .)
            ) and
            (.sbom.filename | test("^[A-Za-z0-9][A-Za-z0-9._+-]*[.]cdx[.]json$")) and
            (.sbom.sha256 | test("^[0-9a-f]{64}$")) and
            (.sbom.size | type == "number" and . > 0 and . <= 67108864 and floor == .)
          ' "$manifest" >/dev/null

          jq -r '.artifacts[].filename' "$manifest" | LC_ALL=C sort > /tmp/expected-dist-files
          find release-bundle/dist -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort > /tmp/actual-dist-files
          diff -u /tmp/expected-dist-files /tmp/actual-dist-files

          while IFS=$'\t' read -r filename expected_digest expected_size; do
            path="release-bundle/dist/$filename"
            [[ -f "$path" && ! -L "$path" && "$(stat -c '%h' "$path")" == 1 ]] || exit 1
            actual_size=$(stat -c '%s' "$path")
            [[ "$actual_size" =~ ^[0-9]+$ && "$actual_size" -gt 0 && "$actual_size" -le 104857600 ]] || exit 1
            [[ "$(sha256sum "$path" | awk '{print $1}')" == "$expected_digest" ]] || exit 1
            [[ "$actual_size" == "$expected_size" ]] || exit 1
          done < <(jq -r '.artifacts[] | [.filename, .sha256, (.size | tostring)] | @tsv' "$manifest")

          sbom="release-bundle/sbom/$(jq -r '.sbom.filename' "$manifest")"
          printf '%s\n' "$(basename "$sbom")" > /tmp/expected-sbom-files
          find release-bundle/sbom -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort > /tmp/actual-sbom-files
          diff -u /tmp/expected-sbom-files /tmp/actual-sbom-files
          [[ -f "$sbom" && ! -L "$sbom" && "$(stat -c '%h' "$sbom")" == 1 ]] || exit 1
          sbom_size=$(stat -c '%s' "$sbom")
          [[ "$sbom_size" =~ ^[0-9]+$ && "$sbom_size" -gt 0 && "$sbom_size" -le 67108864 ]] || exit 1
          [[ "$(sha256sum "$sbom" | awk '{print $1}')" == "$(jq -r '.sbom.sha256' "$manifest")" ]] || exit 1

      - name: Verify PyPI artifact digests and PEP 740 subjects
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          manifest="release-bundle/release/release-manifest.json"
          version=$(jq -r '.version' "$manifest")
          publish_predicate=$(jq -r '.publish_predicate' "$manifest")
          integrity_dir=$(mktemp -d "${RUNNER_TEMP}/roam-pypi-integrity.XXXXXXXXXX")
          chmod 0700 "$integrity_dir"
          if [[ ! -d "$integrity_dir" || -L "$integrity_dir" || "$(stat -c '%a' "$integrity_dir")" != 700 ]]; then
            echo "::error::PyPI integrity workspace is not private."
            exit 1
          fi
          printf 'PYPI_INTEGRITY_DIR=%s\n' "$integrity_dir" >> "$GITHUB_ENV"
          verified=false

          strict_json_file() {
            local path="$1" size links
            [[ -f "$path" && ! -L "$path" ]] || return 1
            size=$(stat -c '%s' "$path")
            links=$(stat -c '%h' "$path")
            [[ "$size" =~ ^[0-9]+$ && "$size" -gt 0 && "$size" -le 16777216 && "$links" == 1 ]] || return 1
            python3 -I -S - "$path" <<'PY'
          import json
          import sys

          def strict_object(pairs):
              result = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate JSON key: {key!r}")
                  result[key] = value
              return result

          def invalid_constant(value):
              raise ValueError(f"non-standard JSON constant: {value}")

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              json.load(handle, object_pairs_hook=strict_object, parse_constant=invalid_constant)
          PY
          }

          for delay in 0 5 10 20 40 60; do
            if [[ "$delay" -gt 0 ]]; then
              echo "::notice::Waiting ${delay}s for PyPI integrity metadata."
              sleep "$delay"
            fi

            release_json="$integrity_dir/release.json"
            if ! release_status=$(curl \
              --silent --show-error \
              --proto '=https' --tlsv1.2 \
              --connect-timeout 10 --max-time 30 \
              --max-filesize 16777216 \
              --output "$release_json" --write-out '%{http_code}' \
              "https://pypi.org/pypi/roam-code/${version}/json"); then
              continue
            fi
            [[ "$release_status" == 200 ]] || continue
            strict_json_file "$release_json" || continue

            if ! jq -e --slurpfile manifest "$manifest" '
              $manifest[0] as $m |
              .info.version == $m.version and
              ([.urls[] | {filename, sha256: .digests.sha256, size}] | sort_by(.filename)) ==
              ([$m.artifacts[] | {filename, sha256, size}] | sort_by(.filename))
            ' "$release_json" >/dev/null; then
              continue
            fi

            provenance_ok=true
            while IFS=$'\t' read -r filename digest; do
              provenance_json="$integrity_dir/${filename}.provenance.json"
              if ! provenance_status=$(curl \
                --silent --show-error \
                --proto '=https' --tlsv1.2 \
                --connect-timeout 10 --max-time 30 \
                --max-filesize 16777216 \
                --header 'Accept: application/vnd.pypi.integrity.v1+json' \
                --output "$provenance_json" --write-out '%{http_code}' \
                "https://pypi.org/integrity/roam-code/${version}/${filename}/provenance"); then
                provenance_ok=false
                break
              fi
              if [[ "$provenance_status" != 200 ]] || ! strict_json_file "$provenance_json" || ! jq -e \
                --arg filename "$filename" \
                --arg digest "$digest" \
                --arg repo "$REPO" \
                --arg predicate "$publish_predicate" '
                  .version == 1 and
                  any(.attestation_bundles[]?;
                    .publisher.kind == "GitHub" and
                    .publisher.repository == $repo and
                    .publisher.workflow == "publish.yml" and
                    .publisher.environment == "pypi" and
                    any(.attestations[]?;
                      .version == 1 and
                      ((.envelope.statement | @base64d | fromjson) as $statement |
                        $statement._type == "https://in-toto.io/Statement/v1" and
                        $statement.predicateType == $predicate and
                        $statement.predicate == null and
                        $statement.subject == [{"name": $filename, "digest": {"sha256": $digest}}]
                      )
                    )
                  )
                ' "$provenance_json" >/dev/null; then
                provenance_ok=false
                break
              fi
            done < <(jq -r '.artifacts[] | [.filename, .sha256] | @tsv' "$manifest")

            if [[ "$provenance_ok" == true ]]; then
              verified=true
              break
            fi
          done

          if [[ "$verified" != true ]]; then
            echo "::error::PyPI files or PEP 740 subjects did not converge to the manifest."
            exit 1
          fi
          echo "Verified exact PyPI wheel/sdist digests and PEP 740 subjects."

      - name: Cryptographically verify both PyPI distributions
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          umask 077
          unset ACTIONS_ID_TOKEN_REQUEST_TOKEN ACTIONS_ID_TOKEN_REQUEST_URL
          unset GH_TOKEN GITHUB_TOKEN PYPI_API_TOKEN SIGSTORE_ID_TOKEN TWINE_PASSWORD TWINE_USERNAME
          manifest="release-bundle/release/release-manifest.json"
          repository_url="https://github.com/${REPO}"
          if [[ -z "${PYPI_INTEGRITY_DIR:-}" || ! -d "$PYPI_INTEGRITY_DIR" || -L "$PYPI_INTEGRITY_DIR" \
            || "$(stat -c '%a' "$PYPI_INTEGRITY_DIR")" != 700 ]]; then
            echo "::error::Validated PyPI integrity workspace is unavailable."
            exit 1
          fi
          release_json="$PYPI_INTEGRITY_DIR/release.json"
          if [[ ! -f "$release_json" || -L "$release_json" || "$(stat -c '%h' "$release_json")" != 1 \
            || "$(stat -c '%s' "$release_json")" -le 0 || "$(stat -c '%s' "$release_json")" -gt 16777216 ]]; then
            echo "::error::Validated PyPI release metadata is unavailable."
            exit 1
          fi
          published_dir="$PYPI_INTEGRITY_DIR/published"
          if [[ -e "$published_dir" || -L "$published_dir" ]]; then
            echo "::error::PyPI artifact verification directory is not fresh."
            exit 1
          fi
          mkdir -m 0700 "$published_dir"
          wheel_verified=0
          sdist_verified=0

          while IFS=$'\t' read -r kind filename expected_digest expected_size; do
            if [[ ! "$filename" =~ ^[A-Za-z0-9][A-Za-z0-9._+-]*$ \
              || ! "$expected_digest" =~ ^[0-9a-f]{64}$ \
              || ! "$expected_size" =~ ^[0-9]+$ ]]; then
              echo "::error::Manifest supplied an invalid PyPI verification subject."
              exit 1
            fi

            distribution="release-bundle/dist/$filename"
            provenance="$PYPI_INTEGRITY_DIR/${filename}.provenance.json"
            if [[ ! -f "$distribution" || -L "$distribution" || "$(stat -c '%h' "$distribution")" != 1 \
              || "$(stat -c '%s' "$distribution")" != "$expected_size" \
              || "$(sha256sum "$distribution" | awk '{print $1}')" != "$expected_digest" ]]; then
              echo "::error::Manifest-bound distribution changed before cryptographic verification: $filename"
              exit 1
            fi
            if [[ ! -f "$provenance" || -L "$provenance" || "$(stat -c '%h' "$provenance")" != 1 ]]; then
              echo "::error::Validated PyPI provenance is unavailable for: $filename"
              exit 1
            fi
            provenance_size=$(stat -c '%s' "$provenance")
            if [[ ! "$provenance_size" =~ ^[0-9]+$ || "$provenance_size" -le 0 || "$provenance_size" -gt 16777216 ]]; then
              echo "::error::PyPI provenance exceeds the verification boundary for: $filename"
              exit 1
            fi

            published_url=$(jq -er --arg filename "$filename" '
              [.urls[] | select(.filename == $filename) | .url] as $urls |
              select(($urls | length) == 1) |
              $urls[0] |
              select(type == "string")
            ' "$release_json")
            python -I -S - "$published_url" "$filename" <<'PY'
          import sys
          from urllib.parse import urlsplit

          url = urlsplit(sys.argv[1])
          filename = sys.argv[2]
          if (
              url.scheme != "https"
              or url.netloc != "files.pythonhosted.org"
              or url.query
              or url.fragment
              or not url.path.startswith("/packages/")
              or not url.path.endswith(f"/{filename}")
          ):
              raise SystemExit("untrusted PyPI artifact URL")
          PY
            published="$published_dir/$filename"
            if ! curl \
              --fail --silent --show-error \
              --proto '=https' --tlsv1.2 \
              --connect-timeout 10 --max-time 90 \
              --max-filesize 104857600 \
              --output "$published" \
              "$published_url"; then
              echo "::error::Could not download the published PyPI artifact: $filename"
              exit 1
            fi
            if [[ ! -f "$published" || -L "$published" || "$(stat -c '%h' "$published")" != 1 \
              || "$(stat -c '%s' "$published")" != "$expected_size" \
              || "$(sha256sum "$published" | awk '{print $1}')" != "$expected_digest" ]]; then
              echo "::error::Published PyPI artifact differs from the release manifest: $filename"
              exit 1
            fi
            cmp --silent "$distribution" "$published" \
              || { echo "::error::Published PyPI artifact differs from the built distribution: $filename"; exit 1; }

            if ! timeout --foreground --signal=TERM --kill-after=5s 90s \
              pypi-attestations verify pypi \
                --repository "$repository_url" \
                --provenance-file "$provenance" \
                "$published"; then
              echo "::error::Cryptographic PyPI provenance verification failed for: $filename"
              exit 1
            fi

            case "$kind" in
              wheel) wheel_verified=$((wheel_verified + 1)) ;;
              sdist) sdist_verified=$((sdist_verified + 1)) ;;
              *)
                echo "::error::Unexpected distribution kind during PyPI provenance verification: $kind"
                exit 1
                ;;
            esac
          done < <(jq -r '.artifacts[] | [.kind, .filename, .sha256, (.size | tostring)] | @tsv' "$manifest")

          if [[ "$wheel_verified" -ne 1 || "$sdist_verified" -ne 1 ]]; then
            echo "::error::Cryptographic verification requires exactly one wheel and one sdist."
            exit 1
          fi
          echo "Cryptographically verified the exact PyPI wheel and sdist against their PEP 740 provenance."

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
        with:
          cosign-release: v2.5.2

      - name: Re-resolve, sign, and verify each transparency-log subject
        env:
          COSIGN_EXPERIMENTAL: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-ref.outputs.tag }}
          EXPECTED_SHA: ${{ needs.resolve-ref.outputs.sha }}
          EXPECTED_MANIFEST_SHA256: ${{ needs.build.outputs.manifest_sha256 }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          manifest="release-bundle/release/release-manifest.json"
          sbom="release-bundle/sbom/$(jq -r '.sbom.filename' "$manifest")"
          certificate_identity="https://github.com/${GITHUB_WORKFLOW_REF}"
          evidence=("$manifest" "$sbom")

          verify_evidence_anchor() {
            [[ "$EXPECTED_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ ]] || return 1
            [[ -f "$manifest" && ! -L "$manifest" && -f "$sbom" && ! -L "$sbom" ]] || return 1
            [[ "$(sha256sum "$manifest" | awk '{print $1}')" == "$EXPECTED_MANIFEST_SHA256" ]] || return 1
            local expected_sbom_sha expected_sbom_size
            expected_sbom_sha=$(jq -er '.sbom.sha256' "$manifest")
            expected_sbom_size=$(jq -er '.sbom.size' "$manifest")
            [[ "$(sha256sum "$sbom" | awk '{print $1}')" == "$expected_sbom_sha" ]] || return 1
            [[ "$(stat -c '%s' "$sbom")" == "$expected_sbom_size" ]] || return 1
          }

          resolve_expected_tag() {
            local ref_json object_type actual_sha tag_json
            ref_json=$(gh api "repos/${REPO}/git/ref/tags/${TAG}")
            object_type=$(jq -r '.object.type' <<<"$ref_json")
            actual_sha=$(jq -r '.object.sha' <<<"$ref_json")
            for _depth in 1 2 3 4 5; do
              [[ "$object_type" == commit ]] && break
              if [[ "$object_type" != tag || ! "$actual_sha" =~ ^[0-9a-f]{40}$ ]]; then
                echo "::error::Release tag changed before transparency-log publication."
                return 1
              fi
              tag_json=$(gh api "repos/${REPO}/git/tags/${actual_sha}")
              object_type=$(jq -r '.object.type' <<<"$tag_json")
              actual_sha=$(jq -r '.object.sha' <<<"$tag_json")
            done
            if [[ "$object_type" != commit || "$actual_sha" != "$EXPECTED_SHA" ]]; then
              echo "::error::Release tag no longer identifies the manifest commit before transparency-log publication."
              return 1
            fi
          }

          for file in "${evidence[@]}"; do
            verify_evidence_anchor
            [[ -f "$file" && ! -L "$file" ]] || exit 1
            resolve_expected_tag
            cosign sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.crt" \
              "$file"
            cosign verify-blob \
              --certificate "${file}.crt" \
              --signature "${file}.sig" \
              --certificate-identity "$certificate_identity" \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              "$file"
          done

      - name: Stage the six verified evidence files
        run: |
          set -euo pipefail
          manifest="release-bundle/release/release-manifest.json"
          sbom="release-bundle/sbom/$(jq -er '.sbom.filename' "$manifest")"
          evidence=(
            "$manifest" "${manifest}.sig" "${manifest}.crt"
            "$sbom" "${sbom}.sig" "${sbom}.crt"
          )
          mkdir -m 0700 signed-evidence
          for source in "${evidence[@]}"; do
            [[ -f "$source" && ! -L "$source" && "$(stat -c '%h' "$source")" == 1 ]] \
              || { echo "::error::Missing or linked signed evidence: $source"; exit 1; }
            name=$(basename "$source")
            [[ "$name" =~ ^[A-Za-z0-9][A-Za-z0-9._+-]*$ ]] || exit 1
            size=$(stat -c '%s' "$source")
            [[ "$size" =~ ^[0-9]+$ && "$size" -gt 0 && "$size" -le 67108864 ]] || exit 1
            install -m 0644 "$source" "signed-evidence/$name"
            cmp --silent "$source" "signed-evidence/$name"
          done
          [[ "$(find signed-evidence -mindepth 1 -maxdepth 1 -type f | wc -l)" == 6 ]]

      - name: Upload one immutable signed-evidence artifact
        id: upload_signed_evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: signed-release-evidence
          path: signed-evidence/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 30

  release-evidence:
    name: Publish one immutable GitHub Release
    needs: [resolve-ref, build, sign-evidence]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write  # create a draft, attach evidence, then publish it once
    steps:
      - name: Download the manifest-bound release bundle by artifact ID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: release-bundle

      - name: Download the signed evidence by artifact ID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.sign-evidence.outputs.artifact_id }}
          path: signed-evidence

      - name: Verify, attach to a draft, and publish exactly once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-ref.outputs.tag }}
          EXPECTED_SHA: ${{ needs.resolve-ref.outputs.sha }}
          EXPECTED_MANIFEST_SHA256: ${{ needs.build.outputs.manifest_sha256 }}
          SIGNED_ARTIFACT_SHA256: ${{ needs.sign-evidence.outputs.artifact_digest }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          manifest="release-bundle/release/release-manifest.json"
          release_state=$(mktemp /tmp/roam-release-state.XXXXXXXXXX)

          strict_json_file() {
            local path="$1" max_bytes="$2" label="$3" size links
            [[ -f "$path" && ! -L "$path" ]] \
              || { echo "::error::$label is not a regular file."; return 1; }
            size=$(stat -c '%s' "$path")
            links=$(stat -c '%h' "$path")
            [[ "$size" =~ ^[0-9]+$ && "$size" -gt 0 && "$size" -le "$max_bytes" && "$links" == 1 ]] \
              || { echo "::error::$label violates its size or hardlink boundary."; return 1; }
            python3 -I -S - "$path" <<'PY'
          import json
          import sys

          def strict_object(pairs):
              result = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate JSON key: {key!r}")
                  result[key] = value
              return result

          def invalid_constant(value):
              raise ValueError(f"non-standard JSON constant: {value}")

          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              json.load(handle, object_pairs_hook=strict_object, parse_constant=invalid_constant)
          PY
          }

          resolve_expected_tag() {
            local ref_json object_type actual_sha tag_json
            ref_json=$(gh api "repos/${REPO}/git/ref/tags/${TAG}")
            object_type=$(jq -r '.object.type' <<<"$ref_json")
            actual_sha=$(jq -r '.object.sha' <<<"$ref_json")
            for _depth in 1 2 3 4 5; do
              [[ "$object_type" == commit ]] && break
              if [[ "$object_type" != tag || ! "$actual_sha" =~ ^[0-9a-f]{40}$ ]]; then
                echo "::error::Release tag changed before immutable publication."
                return 1
              fi
              tag_json=$(gh api "repos/${REPO}/git/tags/${actual_sha}")
              object_type=$(jq -r '.object.type' <<<"$tag_json")
              actual_sha=$(jq -r '.object.sha' <<<"$tag_json")
            done
            if [[ "$object_type" != commit || "$actual_sha" != "$EXPECTED_SHA" ]]; then
              echo "::error::Release tag no longer identifies the manifest commit."
              return 1
            fi
          }

          fetch_release_state() {
            if ! release_status=$(curl \
              --silent --show-error \
              --proto '=https' --tlsv1.2 \
              --connect-timeout 10 --max-time 30 \
              --max-filesize 16777216 \
              --retry 3 --retry-all-errors \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --output "$release_state" --write-out '%{http_code}' \
              "https://api.github.com/repos/${REPO}/releases/tags/${TAG}"); then
              echo "::error::Could not retrieve definitive GitHub Release state."
              return 1
            fi
            case "$release_status" in
              200) strict_json_file "$release_state" 16777216 "GitHub Release response" ;;
              404) ;;
              *)
                echo "::error::Unexpected GitHub Release lookup status: $release_status"
                return 1
                ;;
            esac
          }

          require_exact_release_assets() {
            jq -r '.assets[].name' "$release_state" | LC_ALL=C sort > /tmp/actual-release-assets
            diff -u /tmp/expected-release-assets /tmp/actual-release-assets
          }

          download_release_assets() {
            local destination="$1" name
            mkdir -m 0700 "$destination"
            while IFS= read -r name; do
              gh release download "$TAG" --repo "$REPO" --pattern "$name" --dir "$destination"
            done < /tmp/expected-release-assets
          }

          verify_evidence_set() {
            local directory="$1" subject name size pubkey signature identity
            find "$directory" -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort > /tmp/actual-evidence-files
            diff -u /tmp/expected-release-assets /tmp/actual-evidence-files
            for name in "${evidence_names[@]}"; do
              path="$directory/$name"
              [[ -f "$path" && ! -L "$path" && "$(stat -c '%h' "$path")" == 1 ]] || return 1
              size=$(stat -c '%s' "$path")
              [[ "$size" =~ ^[0-9]+$ && "$size" -gt 0 && "$size" -le 67108864 ]] || return 1
            done
            cmp --silent "$manifest" "$directory/$manifest_name"
            cmp --silent "$sbom" "$directory/$sbom_name"
            for subject in "$directory/$manifest_name" "$directory/$sbom_name"; do
              pubkey=$(mktemp /tmp/roam-release-pubkey.XXXXXXXXXX)
              signature=$(mktemp /tmp/roam-release-signature.XXXXXXXXXX)
              openssl x509 -in "${subject}.crt" -pubkey -noout > "$pubkey"
              base64 --decode "${subject}.sig" > "$signature"
              openssl dgst -sha256 -verify "$pubkey" -signature "$signature" "$subject"
              identity=$(openssl x509 -in "${subject}.crt" -noout -ext subjectAltName)
              if ! grep -Fq "URI:https://github.com/${REPO}/.github/workflows/publish.yml@refs/tags/${TAG}" <<<"$identity" \
                && ! grep -Fq "URI:https://github.com/${REPO}/.github/workflows/publish.yml@refs/heads/${DEFAULT_BRANCH}" <<<"$identity"; then
                echo "::error::Evidence certificate has an unexpected workflow identity."
                return 1
              fi
            done
          }

          strict_json_file "$manifest" 1048576 "release manifest"
          [[ "$EXPECTED_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ \
            && "$(sha256sum "$manifest" | awk '{print $1}')" == "$EXPECTED_MANIFEST_SHA256" ]] || exit 1
          [[ "$SIGNED_ARTIFACT_SHA256" =~ ^[0-9a-f]{64}$ ]] || exit 1
          sbom_name=$(jq -er '.sbom.filename' "$manifest")
          sbom="release-bundle/sbom/$sbom_name"
          strict_json_file "$sbom" 67108864 "release SBOM"
          [[ "$(sha256sum "$sbom" | awk '{print $1}')" == "$(jq -er '.sbom.sha256' "$manifest")" \
            && "$(stat -c '%s' "$sbom")" == "$(jq -er '.sbom.size' "$manifest")" ]] || exit 1

          manifest_name=$(basename "$manifest")
          evidence_names=(
            "$manifest_name" "${manifest_name}.sig" "${manifest_name}.crt"
            "$sbom_name" "${sbom_name}.sig" "${sbom_name}.crt"
          )
          printf '%s\n' "${evidence_names[@]}" | LC_ALL=C sort > /tmp/expected-release-assets
          verify_evidence_set signed-evidence

          resolve_expected_tag
          fetch_release_state
          if [[ "$release_status" == 404 ]]; then
            gh release create "$TAG" --repo "$REPO" --verify-tag --draft --title "$TAG" --generate-notes
            fetch_release_state
          fi
          jq -e --arg tag "$TAG" '.tag_name == $tag and (.draft | type == "boolean") and (.immutable | type == "boolean")' \
            "$release_state" >/dev/null

          if [[ "$(jq -r '.draft' "$release_state")" == true ]]; then
            resolve_expected_tag
            evidence_paths=()
            for name in "${evidence_names[@]}"; do evidence_paths+=("signed-evidence/$name"); done
            gh release upload "$TAG" "${evidence_paths[@]}" --repo "$REPO" --clobber
            fetch_release_state
            require_exact_release_assets
            uploaded=$(mktemp -d /tmp/roam-release-uploaded.XXXXXXXXXX)
            download_release_assets "$uploaded"
            verify_evidence_set "$uploaded"
            resolve_expected_tag
            gh release edit "$TAG" --repo "$REPO" --draft=false

            immutable=false
            for delay in 0 2 5 10; do
              [[ "$delay" -eq 0 ]] || sleep "$delay"
              fetch_release_state
              if jq -e '.draft == false and .immutable == true' "$release_state" >/dev/null; then
                immutable=true
                break
              fi
            done
            [[ "$immutable" == true ]] \
              || { echo "::error::Published release did not become immutable."; exit 1; }
            require_exact_release_assets
            published=$(mktemp -d /tmp/roam-release-published.XXXXXXXXXX)
            download_release_assets "$published"
            verify_evidence_set "$published"
          else
            jq -e '.immutable == true' "$release_state" >/dev/null \
              || { echo "::error::Existing published release is mutable; refusing to modify it."; exit 1; }
            require_exact_release_assets
            existing=$(mktemp -d /tmp/roam-release-existing.XXXXXXXXXX)
            download_release_assets "$existing"
            verify_evidence_set "$existing"
          fi
          resolve_expected_tag
          echo "Verified all six immutable release-evidence assets byte-for-byte."

  smoke:
    name: Verify the published release
    needs: [resolve-ref, release-evidence]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ needs.resolve-ref.outputs.sha }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.13"

      - name: Install and verify the published package
        run: |
          set +e
          for delay in 10 15 30 45 60; do
            python scripts/verify_release.py --pypi --install && exit 0
            echo "::notice::PyPI CDN not ready; retrying in ${delay}s."
            sleep "$delay"
          done
          set -e
          python scripts/verify_release.py --pypi --install

      - name: Verify production security headers
        run: python scripts/verify_release.py --headers
