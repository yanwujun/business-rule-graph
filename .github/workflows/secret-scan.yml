name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  UV_LOCKED: "1"
  UV_NO_PROGRESS: "1"
  UV_PYTHON_DOWNLOADS: "never"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Blocking secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up pinned uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync the exact dev graph
        run: |
          test "$(uv --version)" = "uv 0.11.29"
          uv sync --locked --no-default-groups --extra dev --python python
          uv pip check --python .venv/bin/python

      - name: Run cmd_secrets gate
        run: .venv/bin/roam secrets --fail-on-found

      - name: Run repo leak catalogue gate
        run: .venv/bin/python scripts/scan_internal_language.py --all
