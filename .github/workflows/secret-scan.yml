name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Blocking secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install roam-code
        run: pip install -e ".[dev]"

      - name: Run cmd_secrets gate
        run: roam secrets --fail-on-found

      - name: Run repo leak catalogue gate
        run: python scripts/scan_internal_language.py --all

