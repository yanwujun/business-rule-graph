name: Dogfood (roam on roam)

# DF.1 / DF.18 — eat our own cooking publicly. On every PR + push to main:
#   1. Install roam-code from this checkout
#   2. Run `roam dogfood` (audit + pr-analyze + audit-trail + conformance)
#   3. Surface verdict + score in the workflow summary
#   4. Post a sticky PR comment via `roam pr-comment-render`
#   5. Upload the audit trail as a workflow artifact for compliance review
#
# This workflow uses the same engines that ship to customers — when it
# breaks, customers will too. When it passes, our trust signal is real.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel stale dogfood runs when a new commit lands on the same PR / branch.
# Unlike publish + cga-attestation, dogfood is a pure read-only audit with
# no external side effects (no PyPI upload, no Rekor entry, no release asset
# mutation), so cancelling the old run on a force-push or rapid commit
# sequence is the right trade-off — saves CI minutes and keeps the sticky
# PR comment fresh against the latest tip.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_LOCKED: "1"
  UV_NO_PROGRESS: "1"
  UV_PYTHON_DOWNLOADS: "never"

jobs:
  dogfood:
    name: Roam dogfood
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write   # post the sticky PR comment
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 50  # enough for pr-prep churn analysis
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up pinned uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync the exact runtime graph
        run: |
          test "$(uv --version)" = "uv 0.11.29"
          uv sync --locked --no-default-groups --python python
          uv pip check --python .venv/bin/python

      - name: Index repo
        run: .venv/bin/roam index

      - name: Run dogfood (audit + pr-analyze + audit-trail + conformance)
        run: |
          set -euo pipefail
          .venv/bin/roam --json dogfood --no-audit-trail > dogfood.json
          .venv/bin/python - <<'PY'
          import json
          import os
          import pathlib

          env = json.loads(pathlib.Path("dogfood.json").read_text(encoding="utf-8"))
          assert env.get("command") == "dogfood", env
          s = env.get("summary") or {}
          assert isinstance(s, dict), env
          sections = set(s.get("sections_run") or [])
          missing = {"audit", "pr_analyze"} - sections
          assert not missing, f"dogfood omitted required sections: {sorted(missing)}"
          verdict = s.get("verdict", "?")
          health = s.get("health_score", "?")
          pr_verdict = s.get("pr_verdict", "?")
          conf = s.get("conformance_score", "?")
          summary_md = (
              f"## Roam dogfood verdict\n\n"
              f"**{verdict}**\n\n"
              f"| metric | value |\n|---|---|\n"
              f"| health | {health}/100 |\n"
              f"| pr-analyze | {pr_verdict} |\n"
              f"| conformance | {conf}/100 |\n"
          )
          gh_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if gh_summary:
              pathlib.Path(gh_summary).write_text(summary_md, encoding="utf-8")
          if s.get("partial_success"):
              failed = s.get("failed_sections") or s.get("warnings_out") or "undisclosed sections"
              raise SystemExit(f"dogfood execution degraded: {failed}")
          PY

      - name: Render PR comment (pr-analyze on PR diff)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          # Bind the diff to the event's immutable base commit. Mapping the
          # expression through env keeps event data out of shell source.
          if [[ ! "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Pull-request base is not a full commit SHA."
            exit 1
          fi
          git fetch --no-tags origin "$BASE_SHA"
          git diff "$BASE_SHA..HEAD" > pr.diff
          # A BLOCK verdict remains advisory in this reporting workflow because
          # --gate is deliberately omitted; process and envelope failures are fatal.
          .venv/bin/roam --json pr-analyze --input pr.diff --explain > pr-analyze.json
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("pr-analyze.json").read_text(encoding="utf-8"))
          assert report.get("command") == "pr-analyze", report
          summary = report.get("summary")
          assert isinstance(summary, dict), report
          assert isinstance(summary.get("verdict"), str), summary
          PY
          .venv/bin/roam pr-comment-render --input pr-analyze.json > pr-comment.md

      - name: Post sticky comment to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: roam-dogfood
          path: pr-comment.md

      # Always retain partial evidence for failed runs; missing evidence is an
      # error, and artifact collection cannot turn a failed gate into success.
      - name: Upload dogfood evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: roam-dogfood-${{ github.run_id }}
          path: |
            dogfood.json
            pr-analyze.json
            pr-comment.md
          if-no-files-found: error
          retention-days: 30
