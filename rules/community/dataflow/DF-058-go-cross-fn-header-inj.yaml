name: DF-058-go-cross-fn-header-inj
description: "Cross-function header injection: request data flows to response header."
severity: warning
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['r.URL.Query()', 'r.Header.Get(']
  sinks: ['w.Header().Set(', 'w.Header().Add(']
  max_chain_length: 4
  min_confidence: 0.5
  file_glob: "**/*.go"
