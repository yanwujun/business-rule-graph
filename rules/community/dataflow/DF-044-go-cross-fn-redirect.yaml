name: DF-044-go-cross-fn-redirect
description: "Cross-function open redirect: query param flows to redirect."
severity: warning
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['r.URL.Query()', 'r.FormValue(']
  sinks: ['http.Redirect(']
  max_chain_length: 4
  min_confidence: 0.5
  file_glob: "**/*.go"
