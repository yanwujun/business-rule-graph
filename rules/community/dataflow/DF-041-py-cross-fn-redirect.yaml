name: DF-041-py-cross-fn-redirect
description: "Cross-function open redirect: user input flows to redirect."
severity: warning
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['request.args', 'request.form', 'request.json']
  sinks: ['redirect(', 'make_response(']
  max_chain_length: 4
  min_confidence: 0.5
  file_glob: "**/*.py"
