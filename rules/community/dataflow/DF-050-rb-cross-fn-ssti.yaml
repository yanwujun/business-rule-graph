name: DF-050-rb-cross-fn-ssti
description: "Cross-function SSTI: user params flow to template rendering."
severity: error
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['params[', 'request.params']
  sinks: ['ERB.new(', 'render(inline:']
  max_chain_length: 4
  min_confidence: 0.5
  file_glob: "**/*.rb"
