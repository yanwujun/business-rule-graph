name: DF-031-py-cross-fn-xss
description: "Cross-function XSS: user input flows to unescaped output."
severity: error
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['request.args', 'request.form', 'request.json', 'request.data']
  sinks: ['render_template_string(', 'Markup(', 'response.write(']
  max_chain_length: 5
  min_confidence: 0.5
  file_glob: "**/*.py"
