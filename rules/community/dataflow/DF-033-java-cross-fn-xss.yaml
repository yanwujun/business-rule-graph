name: DF-033-java-cross-fn-xss
description: "Cross-function XSS: servlet parameter flows to response."
severity: error
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['request.getParameter(', 'request.getAttribute(', 'request.getHeader(']
  sinks: ['response.getWriter().write(', 'response.getOutputStream(', 'out.println(']
  max_chain_length: 5
  min_confidence: 0.5
  file_glob: "**/*.java"
