name: DF-053-java-cross-fn-xxe
description: "Cross-function XXE: request stream flows to XML parser."
severity: error
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['request.getInputStream(', 'request.getReader(']
  sinks: ['DocumentBuilder.parse(', 'SAXParser.parse(', 'XMLReader.parse(']
  max_chain_length: 5
  min_confidence: 0.5
  file_glob: "**/*.java"
