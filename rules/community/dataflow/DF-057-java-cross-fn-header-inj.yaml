name: DF-057-java-cross-fn-header-inj
description: "Cross-function header injection: parameter flows to response header."
severity: warning
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['request.getParameter(', 'request.getHeader(']
  sinks: ['response.setHeader(', 'response.addHeader(']
  max_chain_length: 4
  min_confidence: 0.5
  file_glob: "**/*.java"
