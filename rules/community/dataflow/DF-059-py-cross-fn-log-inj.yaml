name: DF-059-py-cross-fn-log-inj
description: "Cross-function log injection: user input flows to log output."
severity: info
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['request.args', 'request.form', 'request.headers']
  sinks: ['logging.info(', 'logging.warning(', 'logging.error(', 'logger.info(']
  max_chain_length: 4
  min_confidence: 0.5
  file_glob: "**/*.py"
