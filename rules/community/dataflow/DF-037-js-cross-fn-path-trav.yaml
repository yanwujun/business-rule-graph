name: DF-037-js-cross-fn-path-trav
description: "Cross-function path traversal: request data flows to filesystem."
severity: error
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['req.query', 'req.body', 'req.params']
  sinks: ['fs.readFile(', 'fs.readFileSync(', 'fs.writeFile(', 'res.sendFile(']
  max_chain_length: 5
  min_confidence: 0.5
  file_glob: "**/*.js"
