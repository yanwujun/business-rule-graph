name: DF-036-py-cross-fn-path-trav
description: "Cross-function path traversal: user input flows to file path."
severity: error
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['request.args', 'request.form', 'request.json']
  sinks: ['open(', 'os.path.join(', 'send_file(', 'send_from_directory(']
  max_chain_length: 5
  min_confidence: 0.5
  file_glob: "**/*.py"
