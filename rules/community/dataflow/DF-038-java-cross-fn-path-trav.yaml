name: DF-038-java-cross-fn-path-trav
description: "Cross-function path traversal: parameter flows to file access."
severity: error
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['request.getParameter(', 'request.getAttribute(']
  sinks: ['new File(', 'new FileInputStream(', 'Files.readAllBytes(']
  max_chain_length: 5
  min_confidence: 0.5
  file_glob: "**/*.java"
