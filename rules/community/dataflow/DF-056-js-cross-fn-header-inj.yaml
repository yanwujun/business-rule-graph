name: DF-056-js-cross-fn-header-inj
description: "Cross-function header injection: request data flows to response header."
severity: warning
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['req.query', 'req.headers']
  sinks: ['res.setHeader(', 'res.set(']
  max_chain_length: 4
  min_confidence: 0.5
  file_glob: "**/*.js"
