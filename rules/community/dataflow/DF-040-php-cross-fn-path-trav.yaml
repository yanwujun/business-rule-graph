name: DF-040-php-cross-fn-path-trav
description: "Cross-function path traversal: superglobal flows to file operation."
severity: error
type: dataflow_match
match:
  patterns: [inter_source_to_sink]
  sources: ['$_GET', '$_POST', '$_REQUEST']
  sinks: ['file_get_contents(', 'fopen(', 'include(', 'require(']
  max_chain_length: 5
  min_confidence: 0.5
  file_glob: "**/*.php"
