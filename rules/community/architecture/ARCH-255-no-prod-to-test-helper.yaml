name: "ARCH-255-no-prod-to-test-helper"
description: "Production code should not import test helpers."
severity: error
type: path_match
match:
  from:
    file_glob: "**/src/**"
    kind: [function, method, class]
  to:
    file_glob: "**/test_helpers/**"
    kind: [function, method, class]
  max_distance: 1
