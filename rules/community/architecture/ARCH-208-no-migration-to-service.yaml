name: "ARCH-208-no-migration-to-service"
description: "Migrations should not depend on services."
severity: error
type: path_match
match:
  from:
    file_glob: "**/migrations/**"
    kind: [function, method, class]
  to:
    file_glob: "**/services/**"
    kind: [function, method, class]
  max_distance: 1
