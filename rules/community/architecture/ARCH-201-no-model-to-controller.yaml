name: "ARCH-201-no-model-to-controller"
description: "Models should not depend on controllers."
severity: error
type: path_match
match:
  from:
    file_glob: "**/models/**"
    kind: [function, method, class]
  to:
    file_glob: "**/controllers/**"
    kind: [function, method, class]
  max_distance: 1
