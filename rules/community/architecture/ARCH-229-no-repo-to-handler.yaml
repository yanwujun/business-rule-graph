name: "ARCH-229-no-repo-to-handler"
description: "Repositories should not depend on handlers."
severity: error
type: path_match
match:
  from:
    file_glob: "**/repositories/**"
    kind: [function, method, class]
  to:
    file_glob: "**/handlers/**"
    kind: [function, method, class]
  max_distance: 1
