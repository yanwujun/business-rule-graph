name: "ARCH-223-no-service-to-handler"
description: "Services should not depend on HTTP handlers."
severity: error
type: path_match
match:
  from:
    file_glob: "**/services/**"
    kind: [function, method, class]
  to:
    file_glob: "**/handlers/**"
    kind: [function, method, class]
  max_distance: 1
