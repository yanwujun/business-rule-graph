name: "ARCH-212-no-domain-to-handlers"
description: "Domain should not depend on HTTP handlers."
severity: error
type: path_match
match:
  from:
    file_glob: "**/domain/**"
    kind: [function, method, class]
  to:
    file_glob: "**/handlers/**"
    kind: [function, method, class]
  max_distance: 1
