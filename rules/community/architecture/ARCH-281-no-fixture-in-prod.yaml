name: "ARCH-281-no-fixture-in-prod"
description: "Test fixtures should not be used in production."
severity: error
type: path_match
match:
  from:
    file_glob: "**/app/**"
    kind: [function, method, class]
  to:
    file_glob: "**/fixtures/**"
    kind: [function, method, class]
  max_distance: 1
