name: "ARCH-240-no-shared-to-app"
description: "Shared libraries should not depend on application code."
severity: error
type: path_match
match:
  from:
    file_glob: "**/shared/**"
    kind: [function, method, class]
  to:
    file_glob: "**/app/**"
    kind: [function, method, class]
  max_distance: 1
