name: "ARCH-263-nestjs-no-repo-in-controller"
description: "NestJS controllers should use services, not repos."
severity: warning
type: path_match
match:
  from:
    file_glob: "**/controllers/**"
    kind: [function, method, class]
  to:
    file_glob: "**/repositories/**"
    kind: [function, method, class]
  max_distance: 1
