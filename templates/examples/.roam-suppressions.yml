# .roam-suppressions.yml — triage allowlist for rule/file findings (W692 substrate).
#
# Copy this file to .roam-suppressions.yml at your repo root. The
# `roam triage` workflow reads + writes it via `roam.commands.suppression`
# and matches by (rule, file[, line]). Use it when a finding has been
# reviewed by a human and accepted, deferred, or marked as a false
# positive.
#
# Use this file when the suppression is human-driven and audit-trail-
# friendly: every entry carries an explicit `status` (safe / acknowledged
# / wont-fix), `reason`, `author`, and `date`. Prefer `.roamignore-findings`
# for pattern-based bulk suppression; prefer `.roam/suppressions.json`
# for hash-keyed precise carve-outs from `roam suppress <finding_id>`.
#
# Match semantics (see src/roam/commands/suppression.py::is_suppressed):
#   - `rule` and `file` must match exactly (path normalised to forward slashes)
#   - `line` (optional) requires an exact line match; absence suppresses
#     all lines in that file for that rule
#   - `status` must be one of: safe, acknowledged, wont-fix

suppressions:
  # Suppresses every secret-detection hit inside the test-fixtures
  # directory because the secrets there are deliberately fake.
  - rule: secret-detection
    file: tests/fixtures/fake_secrets.py
    reason: Test fixtures with fake credentials
    status: safe
    author: dev@example.com
    date: 2026-02-25

  # Suppresses complexity-high on the indexer pipeline at the specific
  # entrypoint line — the surrounding helpers stay gated.
  - rule: complexity-high
    file: src/roam/index/indexer.py
    line: 142
    reason: Intentionally complex pipeline — splitting hurts readability
    status: acknowledged
    author: alice@example.com
    date: 2026-05-10

  # Suppresses every missing-docstring finding inside generated code.
  - rule: missing-docstring
    file: src/generated/proto_pb2.py
    reason: Generated by protoc — manual edits get overwritten
    status: wont-fix
    author: bob@example.com
    date: 2026-03-18

  # Suppresses an N+1 finding flagged in the legacy report view; rewrite
  # is tracked in JIRA-3142 and scheduled for the next refactor wave.
  - rule: n-plus-one
    file: src/reports/legacy_view.py
    line: 88
    reason: Tracked in JIRA-3142 — refactor scheduled for v15
    status: acknowledged
    author: carol@example.com
    date: 2026-05-01

# Schema reference
# ----------------
# Canonical loader:  roam.commands.suppression.load_suppressions
# Typed loader:      roam.commands.suppression.load_suppressions_typed
# Dataclass:         roam.policy.suppression_v2.RuleFileSuppression
# Matcher:           roam.commands.suppression.is_suppressed
# Writer:            roam.commands.suppression.save_suppression
#
# Required fields:   rule, file
# Optional fields:   line, reason, status, author, date, expires
# Status enum:       safe | acknowledged | wont-fix
# Date format:       YYYY-MM-DD (UTC)
#
# Run `roam triage` to interactively manage entries; `roam suppress` for
# hash-keyed entries (writes to .roam/suppressions.json instead).
