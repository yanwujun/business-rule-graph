# Go starter rule pack for `roam pr-analyze`
#
# 12 rules covering the most common AI-generated-code anti-patterns in
# Go projects. Drop at `.roam/rules.yml` in your repo root.
#
# Tuned against Cursor / Claude / Copilot output Q1-Q2 2026, with a
# focus on the Go-specific failure modes (panic-instead-of-error,
# unsafe imports, banned reflect uses).
#
# Validate before shipping:
#   roam rules-validate templates/rules/go/.roam-rules.yml --explain

rules:
  # ---- Dangerous APIs ----

  # WARN (not BLOCK) because unsafe.Pointer legitimately appears in
  # performance-critical FFI bridges — the violation needs human review
  # to confirm it isn't escaping into general application code.
  - id: go-no-unsafe
    description: "Remove unsafe imports outside FFI bridges; unsafe.Pointer bypasses Go memory safety."
    pattern: import_from
    source_glob: "**/*.go"
    forbidden_target_glob: unsafe
    severity: WARN

  - id: go-no-cgo
    description: "Gate cgo imports behind an explicit ADR; C interop adds a non-Go toolchain dependency."
    pattern: import_from
    source_glob: "**/*.go"
    forbidden_target_glob: "C"
    severity: WARN

  - id: go-no-os-exec-shell
    description: "Audit os/exec call sites for shell-injection; review every external argument."
    pattern: import_from
    source_glob: "**/*.go"
    forbidden_target_glob: "os/exec"
    severity: WARN

  - id: go-no-md5-sha1
    description: "Replace crypto/md5 + crypto/sha1 with crypto/sha256 or crypto/sha512; MD5 and SHA1 are broken for security."
    pattern: import_from
    source_glob: "**/*.go"
    forbidden_target_glob: "crypto/{md5,sha1}"
    severity: BLOCK

  - id: go-no-net-rpc
    description: "Replace net/rpc with gRPC, connect-go, or fiber; net/rpc is deprecated for new services."
    pattern: import_from
    source_glob: "**/*.go"
    forbidden_target_glob: "net/rpc*"
    severity: WARN

  # ---- Common AI-generated anti-patterns ----

  - id: go-no-panic
    description: "Return an error instead of calling panic() in library code; panic propagates failure modes badly."
    pattern: function_call
    source_glob: "**/*.go"
    forbidden_target_glob: panic
    severity: WARN

  - id: go-no-fmt-println-in-prod
    description: "Remove fmt.Println from production code; stray println calls are forgotten debugging output."
    pattern: function_call
    source_glob: "**/*.go"
    forbidden_target_glob: fmt.Println
    severity: WARN

  - id: go-no-init-funcs-in-libs
    description: "Replace library init() with explicit constructors; init causes hidden ordering issues."
    pattern: function_call
    source_glob: "lib/**/*.go"
    forbidden_target_glob: init
    severity: WARN

  # ---- LLM-favourite hallucinated imports ----

  # WHY: LLMs frequently hallucinate "v2" / numbered package paths when the
  # real package already exists at a non-numbered path. Renaming forces the
  # author to confirm the actual target.
  - id: go-no-numbered-modules
    description: "Rename or remove numbered modules (foo_v2, util1); these names are typical LLM hallucinations."
    pattern: import_from
    source_glob: "**/*.go"
    forbidden_target_glob: "*_v[0-9]*"
    severity: WARN

  - id: go-no-helpers-helpers
    description: "Rename helpers/helpers and utils/utils paths to a domain-specific package; these are LLM placeholders."
    pattern: import_from
    source_glob: "**/*.go"
    forbidden_target_glob: "*helpers/helpers*"
    severity: WARN

  # ---- Layer-violation rules ----

  - id: go-no-direct-db-from-handler
    description: "Route HTTP handlers through the service layer; handlers must not import db packages directly."
    pattern: import_from
    source_glob: "internal/handlers/**/*.go"
    forbidden_target_glob: "*/db/*"
    severity: BLOCK

  - id: go-no-internal-from-public
    description: "Public packages must not depend on internal/; Go enforces this but custom layouts can drift."
    pattern: import_from
    source_glob: "pkg/**/*.go"
    forbidden_target_glob: "*/internal/*"
    severity: BLOCK
