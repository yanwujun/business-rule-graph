# Java starter rule pack for `roam pr-analyze`
#
# 12 rules covering the most common AI-generated-code anti-patterns in
# Java projects. Drop at `.roam/rules.yml` in your repo root.
#
# Tuned against Cursor / Claude / Copilot output Q1-Q2 2026, with a
# focus on the Java-specific failure modes (deserialization, reflection,
# raw collections, deprecated APIs).
#
# Validate before shipping:
#   roam rules-validate templates/rules/java/.roam-rules.yml --explain

rules:
  # ---- Dangerous APIs ----

  - id: java-no-runtime-exec
    description: "Replace Runtime.getRuntime().exec() with ProcessBuilder + list args; exec() bypasses argv quoting."
    pattern: function_call
    source_glob: "src/**/*.java"
    forbidden_target_glob: "Runtime.getRuntime"
    severity: BLOCK

  - id: java-no-system-exit-in-libs
    description: "Replace System.exit() in library code with a thrown exception; System.exit kills the host process."
    pattern: function_call
    source_glob: "src/main/java/**/*.java"
    forbidden_target_glob: "System.exit"
    severity: BLOCK

  - id: java-no-object-input-stream
    description: "Replace ObjectInputStream.readObject with JSON or protobuf; readObject on untrusted bytes is RCE."
    pattern: import_from
    source_glob: "src/**/*.java"
    forbidden_target_glob: "java.io.ObjectInputStream"
    severity: BLOCK

  - id: java-no-md5-mac
    description: "Replace MessageDigest.getInstance(MD5) and HmacMD5 with SHA-256+ or HmacSHA256+; MD5 is broken for security uses."
    pattern: function_call
    source_glob: "src/**/*.java"
    forbidden_target_glob: "MessageDigest.getInstance"
    severity: WARN

  - id: java-no-printstacktrace
    description: "Replace e.printStackTrace() with a structured logger (slf4j / log4j2); printStackTrace leaks exceptions to stderr."
    pattern: function_call
    source_glob: "src/main/java/**/*.java"
    forbidden_target_glob: "*.printStackTrace"
    severity: WARN

  # ---- AI-generated anti-patterns ----

  - id: java-no-raw-types
    description: "Raw collection types (List, Map without generics) lose compile-time safety; LLMs often generate these."
    pattern: import_from
    source_glob: "src/**/*.java"
    forbidden_target_glob: "java.util.{Vector,Hashtable,Stack,Properties}"
    severity: WARN

  - id: java-no-thread-stop
    description: "Replace Thread.stop() with cooperative interruption; Thread.stop is deprecated and corrupts monitor state."
    pattern: function_call
    source_glob: "src/**/*.java"
    forbidden_target_glob: "*.stop"
    severity: WARN

  - id: java-no-deprecated-annotation
    description: "@Deprecated on new code is a code smell — remove or rename."
    pattern: decorator_use
    source_glob: "src/**/*.java"
    forbidden_target_glob: "Deprecated"
    severity: WARN

  # ---- LLM hallucination patterns ----

  # WHY: LLMs frequently hallucinate "v2" / numbered package names when the
  # real package already exists at a non-numbered path. Renaming forces the
  # author to confirm the actual target.
  - id: java-no-numbered-packages
    description: "Rename or remove numbered packages (com.foo.v2, com.foo.utils2); these names are typical LLM hallucinations."
    pattern: import_from
    source_glob: "src/**/*.java"
    forbidden_target_glob: "*.v[0-9]*.*"
    severity: WARN

  - id: java-no-utils-utils
    description: "com.x.utils.Utils and com.x.helpers.Helpers are LLM placeholders."
    pattern: import_from
    source_glob: "src/**/*.java"
    forbidden_target_glob: "*.{utils.Utils,helpers.Helpers}"
    severity: WARN

  # ---- Architecture / layer-violation ----

  # BLOCK because a controller reaching java.sql.* skips the service /
  # repository layer entirely — transaction boundaries, retry policy, and
  # tests written against the repository contract all stop applying.
  - id: java-no-jdbc-from-controller
    description: "Route controller persistence calls through the service / repository layer; controllers must not import java.sql.*."
    pattern: import_from
    source_glob: "src/main/java/**/controller/**/*.java"
    forbidden_target_glob: "java.sql.*"
    severity: BLOCK

  - id: java-no-test-imports-in-prod
    description: "Production code must not import from src/test/."
    pattern: import_from
    source_glob: "src/main/java/**/*.java"
    forbidden_target_glob: "*.test.fixtures.*"
    severity: BLOCK
