# Python starter rule pack for `roam pr-analyze`
#
# 14 rules covering the most common AI-generated-code anti-patterns in
# Python projects. Drop at `.roam/rules.yml` in your repo root.
#
# Tuned against Cursor / Claude / Copilot output Q1-Q2 2026. Each rule
# includes a `description` so the PR comment surfaces *why* it fired.
#
# Severities: BLOCK (gate failure) | WARN | INFO. CI gate fires on any
# BLOCK; WARN/INFO are advisory.
#
# Validate this pack before shipping it to your team:
#   roam rules-validate templates/rules/python/.roam-rules.yml --explain
#
# See `roam audit-trail-conformance-check` if you also need EU AI Act
# Article 12 record-keeping (the audit-trail flag on pr-analyze emits the
# JSONL records this checker validates).

rules:
  # ---- Dangerous APIs ----

  - id: py-no-eval
    description: Replace eval() with ast.literal_eval or a real parser; eval() executes arbitrary code.
    pattern: function_call
    source_glob: "src/**/*.py"
    forbidden_target_glob: eval
    severity: BLOCK

  - id: py-no-exec
    description: Remove exec(); it runs arbitrary code at runtime and is almost always a placeholder for missing structure.
    pattern: function_call
    source_glob: "src/**/*.py"
    forbidden_target_glob: exec
    severity: BLOCK

  - id: py-no-pickle-loads
    description: Replace pickle.loads with json or msgpack; pickle.loads on untrusted data is RCE.
    pattern: function_call
    source_glob: "src/**/*.py"
    forbidden_target_glob: pickle.loads
    severity: BLOCK

  - id: py-no-os-system
    description: Replace os.system with subprocess.run + list args; os.system bypasses argv quoting.
    pattern: function_call
    source_glob: "src/**/*.py"
    forbidden_target_glob: os.system
    severity: BLOCK

  # WARN (not BLOCK) because subprocess.* legitimately covers Popen / run /
  # check_output etc. — the violation needs human review to confirm shell=True
  # vs. a list-args call.
  - id: py-no-shell-true
    description: Pass a list to subprocess instead of shell=True to avoid shell-injection vectors.
    pattern: function_call
    source_glob: "src/**/*.py"
    forbidden_target_glob: subprocess.*
    severity: WARN

  - id: py-no-yaml-load
    description: Use yaml.safe_load instead of yaml.load to block arbitrary-object deserialization.
    pattern: function_call
    source_glob: "src/**/*.py"
    forbidden_target_glob: yaml.load
    severity: BLOCK

  # ---- LLM-favourite hallucinated imports ----

  # WHY: LLMs frequently hallucinate "v2" / numbered module names when the
  # real module already exists at a non-numbered path. Renaming forces the
  # author to confirm the actual target.
  - id: py-no-numbered-modules
    description: Rename or remove numbered modules (foo_v2, util1); these names are typical LLM hallucinations.
    pattern: import_from
    source_glob: "src/**/*.py"
    forbidden_target_glob: "*_v[0-9]*"
    severity: WARN

  - id: py-no-helper-helper
    description: Replace helpers.helpers / utils.utils with a domain-specific module name; doubled-name modules are LLM placeholders.
    pattern: import_from
    source_glob: "src/**/*.py"
    forbidden_target_glob: "*helpers.helpers*"
    severity: WARN

  # ---- Architecture / layer-violation ----

  - id: py-no-test-imports-from-prod
    description: Production code must not import from test fixtures.
    pattern: import_from
    source_glob: "src/**/*.py"
    forbidden_target_glob: "tests.fixtures.*"
    severity: BLOCK

  - id: py-no-internal-from-public
    description: Public API must not import private/internal modules directly.
    pattern: import_from
    source_glob: "src/**/api/*.py"
    forbidden_target_glob: "*._internal.*"
    severity: BLOCK

  # ---- Stale-code markers in new code ----

  - id: py-no-deprecated-decorator
    description: "Remove @deprecated from new code: either delete the decorator or delete the function it marks."
    pattern: decorator_use
    source_glob: "src/**/*.py"
    forbidden_target_glob: deprecated
    severity: WARN

  - id: py-no-todo-decorator
    description: "Resolve @todo decorators before shipping; they leak unfinished work into production releases."
    pattern: decorator_use
    source_glob: "src/**/*.py"
    forbidden_target_glob: todo*
    severity: WARN

  # ---- Dangerous base classes ----

  - id: py-no-deprecated-base
    description: Pick a non-deprecated base class; inheriting from *Deprecated* compounds tech debt downstream.
    pattern: class_inherit
    source_glob: "src/**/*.py"
    forbidden_target_glob: "*Deprecated*"
    severity: WARN

  - id: py-no-unsafe-base
    description: Avoid subclassing *Unsafe* base classes; the name signals known-risky inheritance contracts.
    pattern: class_inherit
    source_glob: "src/**/*.py"
    forbidden_target_glob: "*Unsafe*"
    severity: BLOCK
