# Kotlin starter rule pack for `roam pr-analyze`
#
# 12 rules covering the most common AI-generated-code anti-patterns in
# Kotlin projects (incl. Android + Spring Boot lanes). Drop at
# `.roam/rules.yml` in your repo root.
#
# Tuned against Cursor / Claude / Copilot output Q1-Q2 2026, with a
# focus on Kotlin-specific failure modes (runBlocking in suspend code,
# !! null-bang abuse, GlobalScope leaks, deprecated annotations).
#
# Validate before shipping:
#   roam rules-validate templates/rules/kotlin/.roam-rules.yml --explain

rules:
  # ---- Coroutine / async anti-patterns ----

  - id: kt-no-runblocking-in-suspend
    description: "Replace runBlocking with coroutineScope { } in suspend code; runBlocking defeats cooperative cancellation."
    pattern: function_call
    source_glob: "src/**/*.kt"
    forbidden_target_glob: runBlocking
    severity: WARN

  - id: kt-no-globalscope
    description: "Replace GlobalScope.launch with a structured scope (lifecycleScope, viewModelScope, CoroutineScope(Job())); GlobalScope coroutines outlive the originating component."
    pattern: function_call
    source_glob: "src/**/*.kt"
    forbidden_target_glob: GlobalScope.launch
    severity: BLOCK

  # ---- Dangerous APIs ----

  - id: kt-no-system-exit-in-libs
    description: "System.exit() inside library code kills the host process; throw an exception."
    pattern: function_call
    source_glob: "src/main/kotlin/**/*.kt"
    forbidden_target_glob: "System.exit"
    severity: BLOCK

  - id: kt-no-runtime-exec
    description: "Replace Runtime.getRuntime().exec() with ProcessBuilder + list args; exec() bypasses argv quoting."
    pattern: function_call
    source_glob: "src/**/*.kt"
    forbidden_target_glob: "Runtime.getRuntime"
    severity: BLOCK

  - id: kt-no-printstacktrace
    description: "Replace e.printStackTrace() with a structured logger (slf4j / Timber); printStackTrace leaks exceptions to stderr."
    pattern: function_call
    source_glob: "src/main/kotlin/**/*.kt"
    forbidden_target_glob: "*.printStackTrace"
    severity: WARN

  - id: kt-no-md5
    description: "Replace MessageDigest.getInstance(MD5) with SHA-256 or stronger; MD5 is broken for security uses."
    pattern: function_call
    source_glob: "src/**/*.kt"
    forbidden_target_glob: "MessageDigest.getInstance"
    severity: WARN

  # ---- Kotlin idiom enforcement ----

  - id: kt-no-deprecated-annotation
    description: "@Deprecated on new code is a code smell — remove or rename."
    pattern: decorator_use
    source_glob: "src/**/*.kt"
    forbidden_target_glob: "Deprecated"
    severity: WARN

  # WARN (not BLOCK) because @OptIn legitimately appears inside libraries
  # that intentionally consume an experimental API — the violation needs
  # human review to confirm it isn't escaping into a shipped public surface.
  - id: kt-no-experimental-api
    description: "Remove @OptIn(...ExperimentalApi::class) from shipped code; ExperimentalApi locks the call site to a moving target."
    pattern: decorator_use
    source_glob: "src/main/kotlin/**/*.kt"
    forbidden_target_glob: "OptIn"
    severity: WARN

  # ---- LLM hallucination patterns ----

  # WHY: LLMs frequently hallucinate "v2" / numbered package names when the
  # real package already exists at a non-numbered path. Renaming forces the
  # author to confirm the actual target.
  - id: kt-no-numbered-packages
    description: "Rename or remove numbered packages (com.foo.v2, com.foo.utils2); these names are typical LLM hallucinations."
    pattern: import_from
    source_glob: "src/**/*.kt"
    forbidden_target_glob: "*.v[0-9]*.*"
    severity: WARN

  - id: kt-no-utils-utils
    description: "com.x.utils.Utils and com.x.helpers.Helpers are LLM placeholders."
    pattern: import_from
    source_glob: "src/**/*.kt"
    forbidden_target_glob: "*.{utils.Utils,helpers.Helpers}"
    severity: WARN

  # ---- Architecture / layer violations ----

  - id: kt-no-android-context-in-data-layer
    description: "Data layer must not hold android.content.Context — leaks Activity / breaks unit tests."
    pattern: import_from
    source_glob: "src/main/kotlin/**/data/**/*.kt"
    forbidden_target_glob: "android.content.Context"
    severity: BLOCK

  - id: kt-no-test-imports-in-prod
    description: "Production code must not import from src/test/."
    pattern: import_from
    source_glob: "src/main/kotlin/**/*.kt"
    forbidden_target_glob: "*.test.fixtures.*"
    severity: BLOCK
